name: Wimbledon Tennis Scan

on:
  schedule:
    - cron: '0 9 * * *'   # täglich 09:00 UTC (11:00 MESZ) — nach Spielplan
  workflow_dispatch:        # manuell auslösbar

jobs:
  tennis-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ATP tennis scan
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/tennis_scan.py --bankroll 100 --tour atp

      - name: Run WTA tennis scan
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/tennis_scan.py --bankroll 100 --tour wta

      - name: Commit results
        run: |
          git config user.name "SportsBrain Bot"
          git config user.email "bot@sportsbrain"
          git add results/tennis_scan_*.md results/ledger.csv docs/data/signals.json || true
          git diff --staged --quiet || git commit -m "auto: tennis scan $(date +%Y-%m-%d)"
          git push
