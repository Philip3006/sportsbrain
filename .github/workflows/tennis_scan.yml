name: Wimbledon Tennis Scan

on:
  schedule:
    # Wimbledon 2026: 29. Juni – 13. Juli — davor kein aktiver Scan nötig
    - cron: '0 9 * 7 *'   # täglich 09:00 UTC im Juli
  workflow_dispatch:        # manuell auslösbar

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tennis-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tennis scan (ATP + WTA)
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SIGNALS_CLOUD_URL: ${{ secrets.SIGNALS_CLOUD_URL }}
          SIGNALS_API_TOKEN: ${{ secrets.SIGNALS_API_TOKEN }}
        run: |
          # WTA is the primary focus (+8.5% Wimbledon ROI); ATP uses stricter 10% edge floor
          python scripts/tennis_scan.py --bankroll 100 --tour both

      - name: Commit results (NO ledger — manual confirmation required)
        run: |
          git config user.name "SportsBrain Bot"
          git config user.email "bot@sportsbrain"
          git add results/tennis_scan_*.md docs/data/signals.json || true
          git diff --staged --quiet || git commit -m "auto: tennis scan $(date +%Y-%m-%d)"
          git pull --rebase origin main || true
          git push
