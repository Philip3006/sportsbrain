name: Tennis Scan (year-round, multi-tournament)

on:
  schedule:
    # J2-F: 4× täglich ganzjährig — Discovery filtert via TheOddsAPI /sports
    # auf aktive Turniere. Vor Saison/Off-Season einfach kein Match → no-op.
    - cron: '0 6 * * *'
    - cron: '0 11 * * *'
    - cron: '0 16 * * *'
    - cron: '0 21 * * *'
  workflow_dispatch:        # manuell auslösbar
    inputs:
      all_live:
        description: 'Override: erzwingt mode=live für alle Kategorien'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tennis-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tennis scan (multi-tournament)
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          SIGNALS_CLOUD_URL: ${{ secrets.SIGNALS_CLOUD_URL }}
          SIGNALS_API_TOKEN: ${{ secrets.SIGNALS_API_TOKEN }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUB: ${{ secrets.VAPID_SUB }}
        run: |
          # J2-D: Dispatcher iteriert über alle aktiven Turniere.
          # Mode pro Kategorie: src.config.TENNIS_CATEGORY_MODE
          # (initial nur grand_slam = live, Rest = shadow bis Phase-B-Backtest)
          ALL_LIVE_FLAG=""
          if [ "${{ inputs.all_live }}" = "true" ]; then
            ALL_LIVE_FLAG="--all-live"
          fi
          python scripts/tennis_scan.py --bankroll 100 $ALL_LIVE_FLAG

      - name: Commit results
        run: |
          git config user.name "SportsBrain Bot"
          git config user.email "bot@sportsbrain"
          git add results/tennis_scan_*.md docs/data/signals*.json || true
          git diff --staged --quiet || git commit -m "auto: tennis scan $(date +%Y-%m-%d)"
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase --strategy-option=theirs origin/main \
              || { git rebase --abort 2>/dev/null || true; echo "[push] rebase conflict on attempt $i, retrying"; }
            git push origin main && exit 0
            echo "[push] attempt $i failed, backoff..."
            sleep $((RANDOM % 20 + 10))
          done
          echo "[push] giving up after 5 attempts" >&2; exit 1
