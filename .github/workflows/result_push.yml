name: Result Push (manuell)

on:
  workflow_dispatch:
    inputs:
      home_team:
        description: 'Heimteam'
        required: true
        default: 'France'
      away_team:
        description: 'Auswärtsteam'
        required: true
        default: 'Senegal'
      home_score:
        description: 'Heimtore'
        required: true
        default: '3'
      away_score:
        description: 'Auswärtstore'
        required: true
        default: '1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send-result:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: VAPID-Key Debug (kein Secret-Leak)
        env:
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
        run: |
          python3 - <<'EOF'
          import os, re
          k = os.getenv("VAPID_PRIVATE_KEY", "")
          print(f"Länge: {len(k)}")
          print(f"Startet mit '-----BEGIN': {k.startswith('-----BEGIN')}")
          print(f"Literal \\n vorhanden: {'\\\\n' in k}")
          print(f"Echte Newlines: {k.count(chr(10))}")
          print(f"Erste 30 Zeichen (maskiert): {k[:10]}...{k[-10:] if len(k)>20 else ''}")
          m = re.match(r"(-+BEGIN[^-]+-+)", k)
          print(f"Header: {m.group(1) if m else 'KEIN HEADER'}")
          EOF

      - name: Ergebnis-Push senden
        env:
          HOME_TEAM:         ${{ github.event.inputs.home_team }}
          AWAY_TEAM:         ${{ github.event.inputs.away_team }}
          HOME_SCORE:        ${{ github.event.inputs.home_score }}
          AWAY_SCORE:        ${{ github.event.inputs.away_score }}
          SIGNALS_CLOUD_URL: ${{ secrets.SIGNALS_CLOUD_URL }}
          SIGNALS_API_TOKEN: ${{ secrets.SIGNALS_API_TOKEN }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUB:         ${{ secrets.VAPID_SUB }}
        run: python3 scripts/send_result_push.py
