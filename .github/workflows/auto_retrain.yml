name: Auto-Retrain (6h Kadenz)

on:
  schedule:
    # 00:00, 06:00, 12:00, 18:00 UTC — deckt Nacht- und Tagesspiele ab
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  retrain:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Auto-retrain (DC + LGBM + Stacker)
        id: retrain
        run: python scripts/auto_retrain.py

      - name: Write health snapshot
        if: always()
        env:
          RETRAIN_STATUS: ${{ steps.retrain.outcome == 'failure' && 'error' || 'ok' }}
        run: |
          mkdir -p results/health
          python3 -m src.monitoring.health_writer --job auto_retrain --status "$RETRAIN_STATUS"

      - name: Aggregate & upload health
        if: always()
        env:
          SIGNALS_CLOUD_URL: ${{ secrets.SIGNALS_CLOUD_URL }}
          SIGNALS_API_TOKEN: ${{ secrets.SIGNALS_API_TOKEN }}
        run: python3 -m src.monitoring.aggregate_health --merge-from-committed

      - name: Commit updated models
        run: |
          git config user.name "SportsBrain Bot"
          git config user.email "bot@sportsbrain"
          git add models/ docs/data/health.json || true
          git diff --staged --quiet && echo "No new WM matches — no model changes." && exit 0
          git commit -m "auto: retrain $(date -u '+%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase --strategy-option=theirs origin/main \
              || { git rebase --abort 2>/dev/null || true; echo "[push] rebase conflict on attempt $i, retrying"; }
            git push origin main && exit 0
            echo "[push] attempt $i failed, backoff..."
            sleep $((RANDOM % 20 + 10))
          done
          echo "[push] giving up after 5 attempts" >&2; exit 1
