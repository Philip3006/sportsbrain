name: WM 2026 Daily Scan

on:
  schedule:
    - cron: '0 8 * * *'   # täglich 08:00 UTC (10:00 MESZ)
  workflow_dispatch:        # manuell auslösbar über GitHub UI

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # für git commit des Ledgers

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt && python -m playwright install chromium --with-deps

      - name: Run daily scan
        id: scan
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          SIGNALS_CLOUD_URL: ${{ secrets.SIGNALS_CLOUD_URL }}
          SIGNALS_API_TOKEN: ${{ secrets.SIGNALS_API_TOKEN }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUB: ${{ secrets.VAPID_SUB }}
        run: python scripts/daily_scan.py --bankroll 100 --retrain

      - name: Build WM 2026 Monte-Carlo Forecast + xPoints
        run: python scripts/build_wm_forecast.py --n 2000

      - name: Write health snapshot
        if: always()
        env:
          SCAN_STATUS: ${{ steps.scan.outcome == 'failure' && 'error' || 'ok' }}
        run: |
          mkdir -p results/health
          python3 -m src.monitoring.health_writer --job daily_scan --status "$SCAN_STATUS"

      - name: Aggregate & upload health
        if: always()
        env:
          SIGNALS_CLOUD_URL: ${{ secrets.SIGNALS_CLOUD_URL }}
          SIGNALS_API_TOKEN: ${{ secrets.SIGNALS_API_TOKEN }}
        run: python3 -m src.monitoring.aggregate_health --merge-from-committed

      - name: Commit models + signals + forecast (NO ledger — manual confirmation required)
        run: |
          git config user.name "SportsBrain Bot"
          git config user.email "bot@sportsbrain"
          git add models/ docs/data/signals.json docs/data/wm_forecast.json docs/data/health.json || true
          git diff --staged --quiet || git commit -m "auto: scan $(date +%Y-%m-%d)"
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase --strategy-option=theirs origin/main \
              || { git rebase --abort 2>/dev/null || true; echo "[push] rebase conflict on attempt $i, retrying"; }
            git push origin main && exit 0
            echo "[push] attempt $i failed, backoff..."
            sleep $((RANDOM % 20 + 10))
          done
          echo "[push] giving up after 5 attempts" >&2; exit 1
