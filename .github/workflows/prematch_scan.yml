name: Pre-Match Watchdog (Settlement + Scan)

on:
  schedule:
    # Alle 30 Minuten — MacBook muss NICHT an sein
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  watchdog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Consume pending PWA bets
        id: consume
        env:
          SIGNALS_CLOUD_URL: ${{ secrets.SIGNALS_CLOUD_URL }}
          SIGNALS_API_TOKEN: ${{ secrets.SIGNALS_API_TOKEN }}
        run: python3 -m scripts.consume_pending_bets

      - name: Check window + settle
        id: window
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          SIGNALS_CLOUD_URL: ${{ secrets.SIGNALS_CLOUD_URL }}
          SIGNALS_API_TOKEN: ${{ secrets.SIGNALS_API_TOKEN }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUB: ${{ secrets.VAPID_SUB }}
        run: |
          # 1. Settle completed matches
          python scripts/settle_bets.py

          # 2. Check if scan is needed:
          #    Condition A: game starts in 45–90 min
          #    Condition B: it's 21:30–22:15 UTC and there are games after 22:00 UTC (midnight Berlin)
          python - <<'PYEOF'
          import json, sys
          from datetime import datetime, timezone, timedelta
          from pathlib import Path

          data = json.loads(Path("docs/data/signals.json").read_text())
          now = datetime.now(timezone.utc)
          schedule = data.get("schedule", [])

          def parse_ko(g):
              ko = g.get("kickoff", "")
              if not ko:
                  return None
              try:
                  return datetime.fromisoformat(ko.replace("Z", "+00:00"))
              except Exception:
                  return None

          # Condition A: game starts in 45–90 min (pre-match)
          lo, hi = now + timedelta(minutes=45), now + timedelta(minutes=90)
          for g in schedule:
              ko_dt = parse_ko(g)
              if ko_dt and lo <= ko_dt <= hi:
                  print(f"SCAN_NEEDED=true")
                  print(f"REASON={g['home']} vs {g['away']} @ {ko_dt.strftime('%H:%M')} UTC (45-min)")
                  sys.exit(0)

          # Condition B: midnight Berlin deadline (21:30–22:15 UTC) for night games after 22:00 UTC
          midnight_window = (now.hour == 21 and now.minute >= 30) or (now.hour == 22 and now.minute <= 15)
          if midnight_window:
              night_lo = now.replace(hour=22, minute=0, second=0, microsecond=0)
              night_hi = night_lo + timedelta(hours=10)
              for g in schedule:
                  ko_dt = parse_ko(g)
                  if ko_dt and night_lo <= ko_dt <= night_hi:
                      print(f"SCAN_NEEDED=true")
                      print(f"REASON={g['home']} vs {g['away']} @ {ko_dt.strftime('%H:%M')} UTC (Nacht-Deadline 00:00 Berlin)")
                      sys.exit(0)

          # Condition C: 12h pre-match scan (11:30–12:30h before kickoff)
          # Falls noch keine API-Quoten → WebSearch-Fallback greift automatisch in odds_api.py
          lo_12h = now + timedelta(hours=11, minutes=30)
          hi_12h = now + timedelta(hours=12, minutes=30)
          for g in schedule:
              ko_dt = parse_ko(g)
              if ko_dt and lo_12h <= ko_dt <= hi_12h:
                  berlin_ko = ko_dt + timedelta(hours=2)
                  print(f"SCAN_NEEDED=true")
                  print(f"REASON={g['home']} vs {g['away']} @ {berlin_ko.strftime('%H:%M')} Uhr Berlin (12h-Scan)")
                  sys.exit(0)

          print("SCAN_NEEDED=false")
          PYEOF

      - name: Read bankroll from ledger
        id: bankroll
        if: contains(steps.window.outputs.stdout, 'SCAN_NEEDED=true') || true
        run: |
          BANKROLL=$(python3 -c "
          from src.betting.ledger import ledger_summary
          s = ledger_summary()
          print(round(100 + s['total_pnl'], 2))
          " 2>/dev/null || echo "100")
          echo "bankroll=$BANKROLL" >> $GITHUB_OUTPUT

      - name: Run pre-match scan
        id: prematch
        if: contains(steps.window.outputs.stdout, 'SCAN_NEEDED=true')
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          SIGNALS_CLOUD_URL: ${{ secrets.SIGNALS_CLOUD_URL }}
          SIGNALS_API_TOKEN: ${{ secrets.SIGNALS_API_TOKEN }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUB: ${{ secrets.VAPID_SUB }}
        run: |
          echo "Starte Scan — Bankroll: €${{ steps.bankroll.outputs.bankroll }}"
          python scripts/daily_scan.py --bankroll ${{ steps.bankroll.outputs.bankroll }} --force

      - name: Update dashboard (KV + signals.json) auch ohne Scan
        if: always()
        env:
          SIGNALS_CLOUD_URL: ${{ secrets.SIGNALS_CLOUD_URL }}
          SIGNALS_API_TOKEN: ${{ secrets.SIGNALS_API_TOKEN }}
        run: |
          python -c "from src.notifications.web_dashboard import write_signals_json; write_signals_json()"

      - name: Match-Reminder Push (25-35 Min vor Anpfiff offener Wetten)
        if: always()
        env:
          SIGNALS_CLOUD_URL: ${{ secrets.SIGNALS_CLOUD_URL }}
          SIGNALS_API_TOKEN: ${{ secrets.SIGNALS_API_TOKEN }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUB: ${{ secrets.VAPID_SUB }}
        run: python scripts/match_reminder.py

      - name: Write health snapshots
        if: always()
        env:
          CONSUME_STATUS: ${{ steps.consume.outcome == 'failure' && 'error' || 'ok' }}
          SETTLE_STATUS: ${{ steps.window.outcome == 'failure' && 'error' || 'ok' }}
          PREMATCH_STATUS: ${{ steps.prematch.outcome == 'failure' && 'error' || 'ok' }}
        run: |
          mkdir -p results/health
          python3 -m src.monitoring.health_writer --job consume_pending_bets --status "$CONSUME_STATUS"
          python3 -m src.monitoring.health_writer --job settle --status "$SETTLE_STATUS"
          python3 -m src.monitoring.health_writer --job prematch_scan --status "$PREMATCH_STATUS"

      - name: Aggregate & upload health
        if: always()
        env:
          SIGNALS_CLOUD_URL: ${{ secrets.SIGNALS_CLOUD_URL }}
          SIGNALS_API_TOKEN: ${{ secrets.SIGNALS_API_TOKEN }}
        run: python3 -m src.monitoring.aggregate_health --merge-from-committed

      - name: Commit results
        run: |
          git config user.name "SportsBrain Bot"
          git config user.email "bot@sportsbrain"
          git add results/ledger.csv docs/data/signals.json docs/data/health.json results/scans/ || true
          git diff --staged --quiet && exit 0
          git commit -m "auto: watchdog $(date -u '+%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase --strategy-option=theirs origin/main \
              || { git rebase --abort 2>/dev/null || true; echo "[push] rebase conflict on attempt $i, retrying"; }
            git push origin main && exit 0
            echo "[push] attempt $i failed, backoff..."
            sleep $((RANDOM % 20 + 10))
          done
          echo "[push] giving up after 5 attempts" >&2; exit 1
