<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SportsBrain">
  <meta name="theme-color" content="#0d1117">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>SportsBrain</title>
  <style>
    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --card:     #1c2128;
      --nav-bg:   #161b22;
      --border:   #30363d;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --green:    #00c853;
      --green-d:  #082010;
      --yellow:   #d29922;
      --yellow-d: #2d2208;
      --red:      #f85149;
      --nav-h:    calc(96px + env(safe-area-inset-bottom));
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif; font-size: 14px; -webkit-font-smoothing: antialiased; overscroll-behavior: none; }

    /* ── Header ── */
    header { background: #0d1117; border-bottom: 1px solid rgba(255,255,255,0.08); padding: 0 16px; height: 52px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
    .logo { font-size: 19px; font-weight: 900; letter-spacing: -0.6px; }
    .logo em { color: var(--green); font-style: normal; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .live-pill { display: flex; align-items: center; gap: 5px; background: rgba(0,200,83,0.1); border: 1px solid rgba(0,200,83,0.2); border-radius: 20px; padding: 3px 10px; }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    .updated-text { font-size: 11px; color: var(--green); font-weight: 600; }
    .icon-btn { background: none; border: none; color: var(--muted); font-size: 20px; padding: 4px 6px; cursor: pointer; line-height: 1; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.35} }

    /* ── Bankroll strip ── */
    .bankroll-strip { background: #0d1117; border-bottom: 1px solid rgba(255,255,255,0.07); padding: 8px 12px 6px; }
    .bankroll-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .bankroll-free { font-size: 22px; font-weight: 900; letter-spacing: -.5px; }
    .bankroll-label { font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
    .bankroll-meta { text-align: right; }
    .bankroll-meta-val { font-size: 13px; font-weight: 800; }
    .bankroll-meta-sub { font-size: 10px; color: var(--muted); }
    .exposure-track { width: 100%; height: 6px; background: rgba(255,255,255,.08); border-radius: 3px; overflow: hidden; margin-bottom: 5px; }
    .exposure-fill { height: 100%; border-radius: 3px; transition: width .5s; }
    .exposure-low  { background: var(--green); }
    .exposure-mid  { background: var(--yellow); }
    .exposure-high { background: var(--red); }
    .bankroll-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); }
    .bankroll-row span { font-weight: 600; }
    /* keep old pstat for fallback */
    .pstat { display: none; }
    .pos { color: var(--green); }
    .neg { color: var(--red); }
    .neu { color: var(--text); }

    /* ── Stale banner ── */
    .stale-banner { background: var(--yellow-d); border-bottom: 1px solid var(--yellow); color: var(--yellow); text-align: center; padding: 7px; font-size: 12px; font-weight: 600; display: none; }

    /* ── Views ── */
    main { padding-bottom: var(--nav-h); max-width: 600px; margin: 0 auto; }
    .view { display: none; }
    .view.active { display: block; }

    /* ── Bet365-style match list ── */
    .b365-day-header { background: var(--bg); padding: 12px 16px 4px; font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; }
    .comp-header { background: #111820; border-top: 1px solid rgba(255,255,255,.06); border-bottom: 1px solid rgba(255,255,255,.06); padding: 8px 16px; display: flex; align-items: center; gap: 8px; position: sticky; top: 52px; z-index: 10; }
    .comp-icon { font-size: 14px; flex-shrink: 0; }
    .comp-name { font-size: 12px; font-weight: 700; color: var(--text); flex: 1; letter-spacing: .2px; }
    .comp-meta { font-size: 11px; color: var(--muted); }

    .b365-row { display: flex; align-items: center; padding: 8px 12px 8px 16px; border-bottom: 1px solid rgba(48,54,61,.5); gap: 10px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .b365-row:active { background: rgba(255,255,255,.04); }
    .b365-left { flex: 1; min-width: 0; }
    .b365-time { font-size: 11px; color: var(--muted); font-weight: 600; margin-bottom: 3px; display: flex; align-items: center; gap: 5px; }
    .b365-val-tag { background: rgba(0,200,83,.15); border: 1px solid rgba(0,200,83,.3); color: var(--green); font-size: 10px; font-weight: 800; border-radius: 4px; padding: 1px 5px; }
    .b365-teams { display: flex; flex-direction: column; gap: 2px; }
    .b365-team { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }

    .mkt-header { display: flex; gap: 5px; padding: 5px 12px 5px 0; background: #0d1117; border-bottom: 1px solid rgba(48,54,61,.4); justify-content: flex-end; }
    .mkt-header span { width: 54px; text-align: center; font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: .3px; }
    .b365-odds { display: flex; gap: 5px; flex-shrink: 0; align-items: center; }
    .b365-btn { display: block; background: #1e2733; border: 1px solid rgba(255,255,255,.1); border-radius: 6px; width: 54px; height: 32px; line-height: 32px; text-align: center; font-size: 13px; font-weight: 800; color: var(--text); cursor: pointer; overflow: hidden; }
    .b365-btn.val { background: rgba(0,200,83,.12); border-color: rgba(0,200,83,.5); color: var(--green); }
    .b365-btn.no-odds { color: rgba(255,255,255,.18); font-weight: 400; }

    /* ── Detail view ── */
    .back-bar { display: flex; align-items: center; gap: 6px; padding: 12px 16px 10px; cursor: pointer; color: var(--green); font-size: 15px; font-weight: 600; -webkit-tap-highlight-color: transparent; border-bottom: 1px solid var(--border); }
    .back-bar:active { opacity: .7; }
    .match-header { padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .match-sport { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
    .match-teams { font-size: 22px; font-weight: 900; letter-spacing: -.5px; margin-bottom: 3px; }
    .match-time { font-size: 12px; color: var(--muted); }
    .detail-cards { padding: 12px 16px; }

    /* ── Signal card ── */
    .sig-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; border-left: 3px solid transparent; }
    .ou-accordion { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 10px; }
    .ou-accordion-header { display: flex; align-items: center; gap: 8px; padding: 13px 14px; cursor: pointer; background: var(--card); -webkit-tap-highlight-color: transparent; user-select: none; }
    .ou-accordion-header:active { background: rgba(255,255,255,.03); }
    .ou-accordion-label { font-size: 13px; font-weight: 800; flex: 1; color: var(--text); }
    .ou-value-badge { font-size: 10px; font-weight: 800; background: rgba(0,200,83,.12); color: var(--green); border: 1px solid rgba(0,200,83,.25); border-radius: 10px; padding: 2px 7px; white-space: nowrap; }
    .ou-count { font-size: 11px; font-weight: 700; color: var(--muted); }
    .ou-chevron { font-size: 18px; color: var(--muted); font-weight: 300; line-height: 1; transition: transform .2s ease; }
    .ou-accordion.open .ou-chevron { transform: rotate(90deg); }
    .ou-accordion-body { display: none; }
    .ou-accordion.open .ou-accordion-body { display: block; background: var(--surface); padding: 4px 0 0; }
    .sig-card.high { border-left-color: var(--green); }
    .sig-card.medium { border-left-color: var(--yellow); }
    .card-market { font-size: 12px; color: var(--muted); margin-bottom: 11px; padding: 4px 9px; background: rgba(255,255,255,0.05); border-radius: 6px; display: inline-block; border: 1px solid rgba(255,255,255,0.07); }
    .card-footer { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .odds-btn { background: rgba(0,200,83,0.1); border: 1.5px solid var(--green); border-radius: 8px; padding: 7px 18px; font-size: 20px; font-weight: 900; color: var(--green); flex-shrink: 0; }
    .sig-card.medium .odds-btn { background: rgba(210,153,34,.08); border-color: var(--yellow); color: var(--yellow); }
    .ev-chip { font-size: 13px; font-weight: 700; }
    .ev-h { color: var(--green); }
    .ev-m { color: var(--yellow); }
    .conf-badge { font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; }
    .conf-HIGH   { background: var(--green-d); color: var(--green); border: 1px solid rgba(0,200,83,.2); }
    .conf-MEDIUM { background: var(--yellow-d); color: var(--yellow); border: 1px solid rgba(210,153,34,.2); }
    .stake-val { font-size: 13px; color: var(--muted); margin-left: auto; font-weight: 600; }

    /* ── Sport tabs (Fußball/Tennis): signals grouped by match ── */
    .sport-view-inner { padding: 0 0 8px; }
    .match-group-header { font-size: 12px; font-weight: 700; color: var(--text); padding: 14px 16px 8px; border-bottom: 1px solid rgba(48,54,61,.4); display: flex; align-items: center; gap: 8px; }
    .match-group-header .sport-tag { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; }
    .match-group-cards { padding: 10px 16px 4px; }

    /* ── Section title ── */
    .section-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; padding: 14px 16px 8px; display: flex; align-items: center; gap: 8px; }
    .section-title::after { content:''; flex:1; height:1px; background:var(--border); }

    /* ── Empty / Skeleton ── */
    .empty { text-align: center; padding: 52px 16px; color: var(--muted); }
    .empty .icon { font-size: 34px; margin-bottom: 10px; }
    .skel { background: linear-gradient(90deg,var(--card) 25%,var(--surface) 50%,var(--card) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 12px; height: 80px; margin: 10px 16px; }
    @keyframes shimmer { 0%{background-position:200% 0}100%{background-position:-200% 0} }

    /* ── Journal ── */
    .journal-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin: 0 16px; }
    .journal-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .journal-table th { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
    .journal-table td { padding: 11px 12px; border-bottom: 1px solid rgba(48,54,61,.4); }
    .journal-table tr:last-child td { border-bottom: none; }
    .journal-total { background: rgba(255,255,255,0.03); border-top: 1px solid var(--border); padding: 11px 12px; font-size: 13px; color: var(--muted); display: flex; justify-content: space-between; }

    /* ── Squads view ── */
    .squad-search { position: sticky; top: 52px; z-index: 20; background: var(--bg); padding: 10px 12px; border-bottom: 1px solid var(--border); }
    .squad-search input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; padding: 9px 14px; outline: none; }
    .squad-search input::placeholder { color: var(--muted); }
    .squad-team-row { display: flex; align-items: center; padding: 11px 16px; border-bottom: 1px solid rgba(48,54,61,.4); gap: 12px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .squad-team-row:active { background: rgba(255,255,255,.04); }
    .squad-ampel { font-size: 14px; flex-shrink: 0; }
    .squad-team-name { flex: 1; font-size: 14px; font-weight: 700; }
    .squad-meta { font-size: 12px; color: var(--muted); text-align: right; }
    .squad-source { font-size: 10px; color: var(--muted); }
    /* Squad detail */
    .squad-detail-header { padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .squad-detail-name { font-size: 20px; font-weight: 900; margin-bottom: 4px; }
    .squad-detail-meta { font-size: 12px; color: var(--muted); }
    .squad-pos-group { padding: 10px 16px 4px; font-size: 10px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; border-bottom: 1px solid rgba(48,54,61,.3); }
    .squad-player-row { display: flex; align-items: center; padding: 9px 16px; border-bottom: 1px solid rgba(48,54,61,.3); gap: 10px; }
    .squad-player-pos { width: 30px; font-size: 11px; font-weight: 700; color: var(--muted); }
    .squad-player-name { flex: 1; font-size: 13px; font-weight: 600; }
    .squad-player-status { font-size: 11px; font-weight: 700; }
    .status-fit { color: var(--green); }
    .status-injured { color: var(--red); }
    .status-suspended { color: var(--yellow); }
    .status-doubtful { color: var(--yellow); }

    /* ── Model prediction card ── */
    .pred-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; border-left: 3px solid #4d9fff; }
    .pred-title { font-size: 11px; font-weight: 800; color: #4d9fff; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 12px; }
    .pred-tip { font-size: 16px; font-weight: 900; margin-bottom: 12px; }
    .pred-bars { display: flex; flex-direction: column; gap: 7px; margin-bottom: 12px; }
    .pred-bar-row { display: flex; align-items: center; gap: 8px; }
    .pred-bar-label { width: 24px; font-size: 10px; font-weight: 800; color: var(--muted); text-transform: uppercase; flex-shrink: 0; }
    .pred-bar-track { flex: 1; height: 8px; background: rgba(255,255,255,.07); border-radius: 4px; overflow: hidden; }
    .pred-bar-fill { height: 100%; border-radius: 4px; transition: width .4s; }
    .pred-bar-fill.win { background: var(--green); }
    .pred-bar-fill.draw { background: var(--yellow); }
    .pred-bar-fill.loss { background: rgba(255,255,255,.2); }
    .pred-bar-pct { width: 36px; text-align: right; font-size: 12px; font-weight: 800; flex-shrink: 0; }
    .pred-xg { display: flex; justify-content: space-between; background: rgba(255,255,255,.04); border-radius: 8px; padding: 9px 12px; }
    .pred-xg-team { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .pred-xg-val { font-size: 22px; font-weight: 900; }
    .pred-xg-label { font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .4px; }
    .pred-xg-team-name { font-size: 11px; color: var(--muted); font-weight: 600; text-align: center; max-width: 100px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── Open bets view ── */
    .bet-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin: 8px 16px; }
    .bet-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .bet-match { font-size: 14px; font-weight: 800; }
    .bet-date { font-size: 11px; color: var(--muted); }
    .bet-market-chip { display: inline-block; font-size: 11px; font-weight: 700; background: rgba(255,255,255,.06); border: 1px solid var(--border); border-radius: 6px; padding: 2px 8px; margin-bottom: 8px; }
    .bet-odds-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .bet-odds-entry { font-size: 20px; font-weight: 900; color: var(--text); }
    .bet-odds-arrow { font-size: 16px; }
    .bet-odds-current { font-size: 18px; font-weight: 800; }
    .drift-good { color: var(--green); }
    .drift-bad { color: var(--red); }
    .bet-footer { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .bet-stake { font-size: 12px; color: var(--muted); font-weight: 600; }
    .bet-edge { font-size: 12px; font-weight: 800; }
    .clv-pill { font-size: 10px; font-weight: 800; border-radius: 20px; padding: 2px 8px; }
    .clv-good { background: rgba(0,200,83,.12); color: var(--green); border: 1px solid rgba(0,200,83,.3); }
    .clv-bad { background: rgba(248,81,73,.12); color: var(--red); border: 1px solid rgba(248,81,73,.3); }
    .clv-neutral { background: rgba(255,255,255,.06); color: var(--muted); border: 1px solid var(--border); }

    /* ── Heute-Sektion ── */
    .today-header { background: rgba(0,200,83,.06); border-top: 1px solid rgba(0,200,83,.2); border-bottom: 1px solid rgba(0,200,83,.15); padding: 8px 16px; display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 800; color: var(--green); letter-spacing: .3px; }
    .today-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; flex-shrink: 0; }
    .today-sub { margin-left: auto; font-size: 11px; font-weight: 600; color: var(--muted); }
    .today-row { background: rgba(0,200,83,.02); border-left: 2px solid rgba(0,200,83,.25); }
    .today-countdown { font-size: 10px; font-weight: 800; color: var(--muted); }
    .today-countdown.warn { color: var(--yellow); }
    .today-live-badge { font-size: 10px; font-weight: 900; background: var(--red); color: #fff; border-radius: 4px; padding: 1px 5px; animation: pulse 1.5s infinite; }
    .last-call-badge { font-size: 10px; font-weight: 900; background: rgba(210,153,34,.2); border: 1px solid var(--yellow); color: var(--yellow); border-radius: 4px; padding: 1px 6px; }
    .score-box { background: rgba(255,255,255,.06); border: 1px solid var(--border); border-radius: 8px; padding: 4px 14px; font-size: 20px; font-weight: 900; letter-spacing: -0.5px; flex-shrink: 0; }
    .score-box.result-home { color: var(--green); border-color: rgba(0,200,83,.3); }
    .score-box.result-away { color: var(--red); border-color: rgba(248,81,73,.3); }
    .score-box.result-draw { color: var(--yellow); border-color: rgba(210,153,34,.3); }

    /* ── Value-Radar ── */

    /* ── WM Stats ── */
    .wm-stats-wrap { padding: 12px 16px 4px; }
    .wm-sparkline { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-bottom: 10px; }
    .sparkline-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .sparkline-title { font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .sparkline-delta { font-size: 18px; font-weight: 900; }
    .sparkline-svg { width: 100%; display: block; }
    .stats-table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 10px; }
    .stats-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .stats-table th { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; padding: 8px 10px; text-align: right; border-bottom: 1px solid var(--border); }
    .stats-table th:first-child { text-align: left; }
    .stats-table td { padding: 9px 10px; text-align: right; border-bottom: 1px solid rgba(48,54,61,.4); font-weight: 700; }
    .stats-table td:first-child { text-align: left; color: var(--muted); font-weight: 600; }
    .stats-table tr:last-child td { border-bottom: none; }

    /* ── Group Standings ── */
    .standings-group { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 10px; }
    .standings-group-header { background: rgba(0,200,83,.08); border-bottom: 1px solid rgba(0,200,83,.2); padding: 8px 12px; font-size: 11px; font-weight: 800; color: var(--green); text-transform: uppercase; letter-spacing: .6px; }
    .standings-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .standings-table th { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; padding: 6px 10px; text-align: center; border-bottom: 1px solid var(--border); }
    .standings-table th:first-child { text-align: left; padding-left: 12px; }
    .standings-table td { padding: 8px 10px; text-align: center; border-bottom: 1px solid rgba(48,54,61,.4); font-weight: 700; }
    .standings-table td:first-child { text-align: left; padding-left: 12px; font-size: 13px; }
    .standings-table tr:last-child td { border-bottom: none; }
    .standings-table tr.qualify-q { background: rgba(0,200,83,.05); }
    .standings-table tr.qualify-po { background: rgba(210,153,34,.04); }
    .standings-pts { font-size: 14px; font-weight: 900; color: var(--text); }
    .standings-form span { display: inline-block; width: 16px; height: 16px; border-radius: 3px; font-size: 10px; font-weight: 800; line-height: 16px; text-align: center; margin: 0 1px; }
    .form-W { background: rgba(0,200,83,.3); color: var(--green); }
    .form-D { background: rgba(210,153,34,.3); color: var(--yellow); }
    .form-L { background: rgba(248,81,73,.3); color: var(--red); }

    /* ── Smart Suggest ── */
    .suggest-card { margin: 10px 12px 4px; background: var(--card); border: 1px solid rgba(0,200,83,.25); border-radius: 14px; overflow: hidden; }
    .suggest-header { padding: 12px 16px 10px; display: flex; align-items: flex-start; justify-content: space-between; background: rgba(0,200,83,.06); border-bottom: 1px solid rgba(48,54,61,.6); }
    .suggest-title { font-size: 13px; font-weight: 900; color: var(--green); letter-spacing: -.2px; }

    .suggest-pick { padding: 11px 16px 10px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .suggest-pick:active { background: rgba(255,255,255,.03); }
    .suggest-pick + .suggest-pick { border-top: 1px solid rgba(48,54,61,.6); }
    .suggest-teams-row { font-size: 14px; font-weight: 800; margin-bottom: 7px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .suggest-teams-row .vs { color: var(--muted); font-size: 11px; font-weight: 500; margin: 0 3px; }
    .suggest-bottom-row { display: flex; align-items: center; gap: 8px; }
    .suggest-mkt-pill { font-size: 11px; font-weight: 700; background: rgba(0,200,83,.1); color: var(--green); border: 1px solid rgba(0,200,83,.2); border-radius: 20px; padding: 2px 8px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .suggest-odds { font-size: 16px; font-weight: 900; color: var(--text); flex-shrink: 0; }
    .suggest-ev { font-size: 11px; font-weight: 800; flex-shrink: 0; }
    .suggest-eur { font-size: 12px; font-weight: 700; color: var(--muted); flex-shrink: 0; }

    /* ── Bottom nav ── */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--nav-bg); border-top: 2px solid var(--green); display: flex; padding-bottom: max(env(safe-area-inset-bottom), 10px); z-index: 100; }
    .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 2px 9px; gap: 4px; cursor: pointer; position: relative; -webkit-tap-highlight-color: transparent; min-height: 66px; }
    .nav-tab.active { background: rgba(0,200,83,0.07); }
    .ni { font-size: 22px; line-height: 1; transition: transform 0.15s; }
    .nav-tab.active .ni { transform: scale(1.1); }
    .nl { font-size: 10px; color: #5a6370; font-weight: 700; letter-spacing: .2px; text-transform: uppercase; }
    .nav-tab.active .nl { color: var(--green); }
    .nav-badge { position: absolute; top: 9px; right: calc(50% - 20px); background: var(--green); color: #000; font-size: 10px; font-weight: 900; border-radius: 10px; padding: 1px 6px; min-width: 18px; text-align: center; display: none; }
    .nav-badge.show { display: block; }
  </style>
</head>

<script>
const DATA_URL = 'data/signals.json';
const SQUADS_URL = 'data/squads.json';
let _signals = [];
let _schedule = [];
let _allOdds = {};
let _modelTips = {};
let _openBets = [];
let _bankrollState = {};
let _squads = {};
let _oddsHistory = {};
let _wmResults = {};  // {matchKey: {home_score, away_score}}
let _prevView = 'home';

// ── Navigation ───────────────────────────────────────────────
function navTo(tab) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  _prevView = tab.dataset.view;
  showView(tab.dataset.view);
}
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + id).classList.add('active');
  if (id === 'squads') renderSquads();
}
function closeDetail() { showView(_prevView); }

// ── Open match detail ────────────────────────────────────────
function openMatch(displayKey) {
  const [dh, da] = displayKey.split(' vs ').map(x => x.trim());
  const nk = matchKey(dh, da);
  const sigs = _signals.filter(s => {
    const [sh, sa] = s.match.split(' vs ').map(x => x.trim());
    return matchKey(sh, sa) === nk;
  });
  // Find kickoff + sport from schedule
  const sched = _schedule.find(g => matchKey(g.home, g.away) === nk);
  const s0 = sigs[0];
  const sport = s0?.sport || sched?.sport || 'football';
  const kickoff = s0?.kickoff || sched?.kickoff || '';
  const tour = s0?.tour || sched?.tour || '';
  const sportLabel = sport === 'football' ? '⚽ WM 2026' : `🎾 ${(tour||'Tennis').toUpperCase()}`;
  const timeStr = kickoff ? fmtKickoff(kickoff) : '';
  document.getElementById('detail-header').innerHTML = `
    <div class="match-header">
      <div class="match-sport">${sportLabel}</div>
      <div class="match-teams">${esc(displayKey)}</div>
      ${timeStr ? `<div class="match-time">${timeStr}</div>` : ''}
    </div>`;
  // Look up model tip — try exact key first, then normalized key
  let tip = _modelTips[displayKey];
  if (!tip) {
    for (const [k, v] of Object.entries(_modelTips)) {
      const [kh, ka] = k.split(' vs ').map(x => x.trim());
      if (matchKey(kh, ka) === nk) { tip = v; break; }
    }
  }
  // Find odds for this match
  let oddsEntry = _allOdds[displayKey];
  if (!oddsEntry) {
    const found = Object.entries(_allOdds).find(([k]) => {
      const [kh, ka] = k.split(' vs ').map(x => x.trim());
      return matchKey(kh, ka) === nk;
    });
    oddsEntry = found ? found[1] : {};
  }

  const ouSigs = sigs.filter(s => /^o\/u/.test(s.market));
  const otherSigs = sigs.filter(s => !/^o\/u/.test(s.market));

  let cards = '';
  if (tip) cards += predCard(dh, da, tip, oddsEntry, nk);

  if (!sigs.length) {
    cards += `<div class="empty"><div class="icon">📊</div><div>Kein Value Bet gefunden.<br><small>Unser Modell sieht hier keinen Vorteil.</small></div></div>`;
  } else {
    cards += otherSigs.map(sigCard).join('');
    cards += buildOuAccordion(ouSigs, otherSigs.length === 0);
  }

  if (sport === 'football') cards += squadSection(dh, da);

  document.getElementById('detail-cards').innerHTML = cards;
  showView('detail');
}

// ── Helpers ──────────────────────────────────────────────────
const esc = s => s.replace(/</g,'&lt;').replace(/>/g,'&gt;');

// Normalize team names to match between scanner sources and schedule
const TEAM_ALIASES = {
  'czechia': 'czech republic',
  'united states': 'usa',
  "cote d'ivoire": 'ivory coast',
};
const COUNTRY_FLAGS = {
  'Mexico':'🇲🇽','South Africa':'🇿🇦','South Korea':'🇰🇷','Czechia':'🇨🇿','Czech Republic':'🇨🇿',
  'Canada':'🇨🇦','Bosnia and Herzegovina':'🇧🇦','Bosnia & Herzegovina':'🇧🇦','Qatar':'🇶🇦','Switzerland':'🇨🇭',
  'Brazil':'🇧🇷','Morocco':'🇲🇦','Haiti':'🇭🇹','Scotland':'🏴󠁧󠁢󠁳󠁣󠁴󠁿',
  'United States':'🇺🇸','USA':'🇺🇸','Paraguay':'🇵🇾','Australia':'🇦🇺','Turkey':'🇹🇷',
  'Germany':'🇩🇪','Curacao':'🇨🇼','Curaçao':'🇨🇼',"Cote d'Ivoire":'🇨🇮','Ivory Coast':'🇨🇮','Ecuador':'🇪🇨',
  'Netherlands':'🇳🇱','Japan':'🇯🇵','Sweden':'🇸🇪','Tunisia':'🇹🇳',
  'Belgium':'🇧🇪','Egypt':'🇪🇬','Iran':'🇮🇷','New Zealand':'🇳🇿',
  'Spain':'🇪🇸','Cape Verde':'🇨🇻','Saudi Arabia':'🇸🇦','Uruguay':'🇺🇾',
  'France':'🇫🇷','Senegal':'🇸🇳','Iraq':'🇮🇶','Norway':'🇳🇴',
  'Argentina':'🇦🇷','Algeria':'🇩🇿','Austria':'🇦🇹','Jordan':'🇯🇴',
  'Portugal':'🇵🇹','DR Congo':'🇨🇩','Uzbekistan':'🇺🇿','Colombia':'🇨🇴',
  'England':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','Croatia':'🇭🇷','Ghana':'🇬🇭','Panama':'🇵🇦',
  'Italy':'🇮🇹','Ukraine':'🇺🇦','Poland':'🇵🇱','Serbia':'🇷🇸','Denmark':'🇩🇰',
  'Romania':'🇷🇴','Hungary':'🇭🇺','Greece':'🇬🇷','Nigeria':'🇳🇬','Cameroon':'🇨🇲',
  'Chile':'🇨🇱','Peru':'🇵🇪','Bolivia':'🇧🇴','Venezuela':'🇻🇪','Costa Rica':'🇨🇷',
  'Honduras':'🇭🇳','Jamaica':'🇯🇲','El Salvador':'🇸🇻','Suriname':'🇸🇷',
  'Wales':'🏴󠁧󠁢󠁷󠁬󠁳󠁿','Ireland':'🇮🇪','Slovakia':'🇸🇰','Bulgaria':'🇧🇬','Finland':'🇫🇮',
  'Russia':'🇷🇺','Belarus':'🇧🇾','China':'🇨🇳','Israel':'🇮🇱','Kazakhstan':'🇰🇿',
};
function teamFlag(name) { return COUNTRY_FLAGS[name] || ''; }
function normTeam(name) {
  return name.normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase().replace(/&/g,' and ').replace(/[^a-z0-9 ']/g,'').replace(/\s+/g,' ').trim();
}
function matchKey(a, b) {
  const na = normTeam(a), nb = normTeam(b);
  const na2 = TEAM_ALIASES[na] || na, nb2 = TEAM_ALIASES[nb] || nb;
  return [na2, nb2].join(' vs ');
}

function fmtKickoff(k) {
  try {
    return new Date(k).toLocaleString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit',timeZone:'Europe/Berlin'});
  } catch { return ''; }
}

function fmtTime(k) {
  try {
    return new Date(k).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Berlin'}) + ' Uhr';
  } catch { return ''; }
}

function marketLabel(mkt, match) {
  const p = match.split(' vs ');
  const a = p[0]?.trim()||'?', b = p[1]?.trim()||'?';
  const known = {
    home:`Sieg ${a}`, draw:'Unentschieden', away:`Sieg ${b}`,
    'btts_yes':'Beide treffen','btts_no':'Nicht beide treffen',
    'ftts_home':`1. Tor: ${a}`,'ftts_away':`1. Tor: ${b}`,
    'first_set_a':`1. Satz: ${a}`,'first_set_b':`1. Satz: ${b}`,
    'ah-1.5_a':`${a} 3:0 / 3:1`,'ah+1.5_b':`${b} +1.5 Sätze`,
    'dc_1x':`DC: ${a} oder Remis`,'dc_x2':`DC: Remis oder ${b}`,'dc_12':`DC: ${a} oder ${b}`,
  };
  if (known[mkt]) return known[mkt];
  const ouM = mkt.match(/^o\/u([\d.]+)_(over|under)$/);
  if (ouM) return ouM[2] === 'over' ? `Über ${ouM[1]} Tore` : `Unter ${ouM[1]} Tore`;
  const ahM = mkt.match(/^ah([+-][\d.]+)_(home|away)$/);
  if (ahM) return `AH ${ahM[1]} ${ahM[2] === 'home' ? a : b}`;
  return mkt;
}

// ── Odds movement badge (line movement) ──────────────────────
function oddsMovement(nk, side) {
  // Find match history via normalized key
  let hist = null;
  for (const [k, v] of Object.entries(_oddsHistory)) {
    const [kh, ka] = k.split(' vs ').map(x => x.trim());
    if (matchKey(kh, ka) === nk) { hist = v; break; }
  }
  if (!hist || hist.length < 2) return '';
  const prev = hist[hist.length - 2]; // yesterday
  const curr = hist[hist.length - 1]; // today
  const prevOdds = prev[side];
  const currOdds = curr[side];
  if (!prevOdds || !currOdds) return '';
  const delta = currOdds - prevOdds;
  if (Math.abs(delta) < 0.02) return '';
  const isGood = delta > 0; // rising odds = more value for bettor
  const cls = isGood ? 'drift-good' : 'drift-bad';
  const arrow = isGood ? '▲' : '▼';
  return `<span class="${cls}" style="font-size:10px;font-weight:800;margin-left:4px">${arrow}${Math.abs(delta).toFixed(2)}</span>`;
}

// ── Model prediction card ─────────────────────────────────────
function predCard(home, away, tip, odds, nk) {
  odds = odds || {};
  const ph = Math.round(tip.p_home * 100);
  const pd = Math.round(tip.p_draw * 100);
  const pa = Math.round(tip.p_away * 100);
  // Determine top outcome
  let tipLabel;
  if (tip.p_home >= tip.p_away && tip.p_home >= tip.p_draw) {
    tipLabel = `🏆 ${esc(home)} gewinnt`;
  } else if (tip.p_away >= tip.p_home && tip.p_away >= tip.p_draw) {
    tipLabel = `🏆 ${esc(away)} gewinnt`;
  } else {
    tipLabel = '🤝 Unentschieden';
  }

  // Build Marktübersicht — enriched with all available odds
  const mkts = [];
  if (tip.p_home && odds.home > 1) mkts.push({key: 'home', name: esc(home) + ' gewinnt', p: tip.p_home, q: odds.home});
  if (tip.p_draw && odds.draw > 1) mkts.push({key: 'draw', name: 'Unentschieden', p: tip.p_draw, q: odds.draw});
  if (tip.p_away && odds.away > 1) mkts.push({key: 'away', name: esc(away) + ' gewinnt', p: tip.p_away, q: odds.away});
  // DC markets
  if (tip.p_home && tip.p_draw && odds.dc_1x > 1) mkts.push({key: 'dc_1x', name: `DC: ${esc(home)} oder Remis`, p: tip.p_home + tip.p_draw, q: odds.dc_1x});
  if (tip.p_draw && tip.p_away && odds.dc_x2 > 1) mkts.push({key: 'dc_x2', name: `DC: Remis oder ${esc(away)}`, p: tip.p_draw + tip.p_away, q: odds.dc_x2});
  if (tip.p_home && tip.p_away && odds.dc_12 > 1) mkts.push({key: 'dc_12', name: `DC: ${esc(home)} oder ${esc(away)}`, p: tip.p_home + tip.p_away, q: odds.dc_12});
  if (tip.p_btts_yes && odds.btts_yes > 1) mkts.push({key: 'btts_yes', name: 'Beide treffen', p: tip.p_btts_yes, q: odds.btts_yes});
  if (tip.p_btts_no && odds.btts_no > 1) mkts.push({key: 'btts_no', name: 'Kein BTTS', p: tip.p_btts_no, q: odds.btts_no});

  const mktRows = mkts.map(m => {
    const ev = (m.p * m.q - 1) * 100;
    const isValue = ev > 3;
    const evCls = ev > 0 ? 'color:var(--green)' : 'color:var(--red)';
    const valueBadge = isValue ? ' <span style="background:rgba(0,200,83,.15);border:1px solid rgba(0,200,83,.3);color:var(--green);font-size:9px;font-weight:800;border-radius:4px;padding:1px 4px">VALUE</span>' : '';
    const mvmt = nk ? oddsMovement(nk, m.key) : '';
    return `<tr style="border-bottom:1px solid rgba(48,54,61,.4)">
      <td style="padding:7px 8px;font-size:12px;font-weight:600">${m.name}${valueBadge}</td>
      <td style="padding:7px 8px;font-size:12px;color:var(--muted);text-align:right">${Math.round(m.p*100)}%</td>
      <td style="padding:7px 8px;font-size:13px;font-weight:800;text-align:right">${m.q.toFixed(2)}${mvmt}</td>
      <td style="padding:7px 8px;font-size:12px;font-weight:800;text-align:right;${evCls}">${ev>0?'+':''}${ev.toFixed(1)}%</td>
    </tr>`;
  }).join('');

  const mktTable = mkts.length ? `
    <div style="margin-top:10px">
      <div style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px">Marktübersicht</div>
      <div style="background:rgba(255,255,255,.03);border-radius:8px;overflow:hidden;border:1px solid var(--border)">
        <table style="width:100%;border-collapse:collapse">
          <thead><tr style="border-bottom:1px solid var(--border)">
            <th style="padding:6px 8px;font-size:10px;font-weight:700;color:var(--muted);text-align:left">Markt</th>
            <th style="padding:6px 8px;font-size:10px;font-weight:700;color:var(--muted);text-align:right">Modell</th>
            <th style="padding:6px 8px;font-size:10px;font-weight:700;color:var(--muted);text-align:right">Quote</th>
            <th style="padding:6px 8px;font-size:10px;font-weight:700;color:var(--muted);text-align:right">EV</th>
          </tr></thead>
          <tbody>${mktRows}</tbody>
        </table>
      </div>
    </div>` : '';

  return `<div class="pred-card">
    <div class="pred-title">⚡ Modell-Tipp</div>
    <div class="pred-tip">${tipLabel}</div>
    <div class="pred-bars">
      <div class="pred-bar-row">
        <span class="pred-bar-label">1</span>
        <div class="pred-bar-track"><div class="pred-bar-fill win" style="width:${ph}%"></div></div>
        <span class="pred-bar-pct" style="color:var(--green)">${ph}%</span>
      </div>
      <div class="pred-bar-row">
        <span class="pred-bar-label">X</span>
        <div class="pred-bar-track"><div class="pred-bar-fill draw" style="width:${pd}%"></div></div>
        <span class="pred-bar-pct" style="color:var(--yellow)">${pd}%</span>
      </div>
      <div class="pred-bar-row">
        <span class="pred-bar-label">2</span>
        <div class="pred-bar-track"><div class="pred-bar-fill loss" style="width:${pa}%"></div></div>
        <span class="pred-bar-pct" style="color:var(--muted)">${pa}%</span>
      </div>
    </div>
    <div class="pred-xg">
      <div class="pred-xg-team">
        <span class="pred-xg-val" style="color:var(--text)">${tip.xg_home.toFixed(2)}</span>
        <span class="pred-xg-label">xG</span>
        <span class="pred-xg-team-name">${esc(home)}</span>
      </div>
      <div class="pred-xg-team" style="align-items:center">

        <span class="pred-xg-team-name">${esc(away)}</span>
      </div>

    ${tip.p_btts_yes != null ? `<div style="margin-top:10px;display:flex;gap:8px">
      <div style="flex:1;background:rgba(255,255,255,.04);border-radius:8px;padding:8px 10px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:12px;color:var(--muted);font-weight:700">⚽ Beide treffen</span>
        <span style="font-size:16px;font-weight:900;color:var(--green)">${Math.round(tip.p_btts_yes*100)}%</span>
      </div>
      <div style="flex:1;background:rgba(255,255,255,.04);border-radius:8px;padding:8px 10px;display:flex;justify-content:space-between;align-items:center">

      </div>
    </div>` : ''}
    ${mktTable}
  </div>`;
}

// ── Signal card ──────────────────────────────────────────────
function buildOuAccordion(ouSigs, autoOpen) {
  if (!ouSigs.length) return '';
  const hasValue = ouSigs.some(s => s.ev_pct >= 3);
  const valueBadge = hasValue ? `<span class="ou-value-badge">⚡ Value</span>` : '';
  return `<div class="ou-accordion${autoOpen ? ' open' : ''}">
    <div class="ou-accordion-header" onclick="this.closest('.ou-accordion').classList.toggle('open')">
      <span class="ou-accordion-label">Über / Unter</span>
      ${valueBadge}
      <span class="ou-count">${ouSigs.length} Wetten</span>
      <span class="ou-chevron">›</span>
    </div>
    <div class="ou-accordion-body">${ouSigs.map(s => sigCard(s, false)).join('')}</div>
  </div>`;
}
function sigCard(s, showMatch) {
  const cls = s.confidence === 'HIGH' ? 'high' : 'medium';
  const evCls = s.ev_pct >= 10 ? 'ev-h' : 'ev-m';
  const [sh, sa] = s.match.split(' vs ').map(x => x.trim());
  const matchLine = showMatch
    ? `<div style="font-size:11px;font-weight:700;color:var(--text);margin-bottom:8px;display:flex;align-items:center;gap:6px"><span>⚽</span><span>${esc(sh)}</span><span style="color:var(--muted)">vs</span><span>${esc(sa)}</span></div>`
    : '';
  return `<div class="sig-card ${cls}">
    ${matchLine}
    <div class="card-market">${marketLabel(s.market, s.match)}</div>
    <div class="card-footer">
      <span class="odds-btn">${s.odds.toFixed(2)}</span>
      <span class="ev-chip ${evCls}">EV +${s.ev_pct}%</span>
      <span class="conf-badge conf-${s.confidence}">${s.confidence}</span>
      <span class="stake-val">€${s.stake_eur.toFixed(0)}</span>
    </div>
  </div>`;
}

// ── Render open bets tab ─────────────────────────────────────
function renderBets() {
  const c = document.getElementById('bets-container');
  if (!c) return;
  if (!_openBets.length) {
    c.innerHTML = `<div class="empty"><div class="icon">📭</div><div>Keine offenen Wetten.<br><small>Signals werden täglich 08:00 UTC aktualisiert.</small></div></div>`;
    return;
  }
  const mktLabels = {home:'Heimsieg',draw:'Unentschieden',away:'Auswärtssieg','o/u2.5_over':'Über 2.5','o/u2.5_under':'Unter 2.5',dc_1x:'DC 1X',dc_x2:'DC X2',dc_12:'DC 12'};
  let h = '';
  for (const b of _openBets) {
    const driftCls = b.drift_pct === null ? '' : b.drift_pct < 0 ? 'drift-good' : 'drift-bad';
    const driftArrow = b.drift_pct === null ? '' : b.drift_pct < 0 ? '↓' : '↑';
    const driftStr = b.drift_pct !== null ? `${driftArrow} ${Math.abs(b.drift_pct).toFixed(1)}%` : '—';
    const clvCls = b.clv_signal === 'good' ? 'clv-good' : b.clv_signal === 'bad' ? 'clv-bad' : 'clv-neutral';
    const clvLabel = b.clv_signal === 'good' ? '✓ CLV positiv' : b.clv_signal === 'bad' ? '✗ CLV negativ' : 'CLV n/a';
    const dateStr = b.match_date ? b.match_date.slice(0,10).split('-').reverse().join('.') : '—';
    const edgeStr = b.model_edge_pct !== null && b.model_edge_pct !== undefined ? `Edge: ${b.model_edge_pct > 0 ? '+' : ''}${b.model_edge_pct}%` : '';
    h += `<div class="bet-card">
      <div class="bet-card-header">
        <span class="bet-match">${esc(b.match)}</span>
        <span class="bet-date">${dateStr}</span>
      </div>
      <div class="bet-market-chip">${esc(mktLabels[b.market] || b.market)}</div>
      <div class="bet-odds-row">
        <span class="bet-odds-entry">${b.entry_odds.toFixed(2)}</span>
        <span class="bet-odds-arrow ${driftCls}">→</span>
        <span class="bet-odds-current ${driftCls}">${b.current_odds ? b.current_odds.toFixed(2) : '—'} <small>${driftStr}</small></span>
      </div>
      <div class="bet-footer">
        <span class="bet-stake">€${b.stake.toFixed(0)} Einsatz</span>
        ${edgeStr ? `<span class="bet-edge ${b.model_edge_pct > 0 ? 'drift-good' : 'drift-bad'}">${esc(edgeStr)}</span>` : ''}
        <span class="clv-pill ${clvCls}">${clvLabel}</span>
      </div>
    </div>`;
  }
  c.innerHTML = h;
}

// ── Render Bankroll strip ─────────────────────────────────────
function renderBankrollStrip() {
  const b = _bankrollState;
  if (!b || b.free == null) return;
  const free = b.free ?? 0;
  const pnl = (b.pnl_closed ?? 0);
  const maxWin = b.max_win ?? 0;
  const staked = b.staked ?? 0;
  const exp = b.exposure_pct ?? 0;
  const openCount = (_openBets || []).length;

  document.getElementById('br-free').textContent = '€' + free.toFixed(2);
  const pnlEl = document.getElementById('br-pnl');
  pnlEl.textContent = (pnl >= 0 ? '+' : '') + pnl.toFixed(2) + '€';
  pnlEl.style.color = pnl > 0 ? 'var(--green)' : pnl < 0 ? 'var(--red)' : 'var(--text)';
  document.getElementById('br-maxwin').textContent = '+€' + maxWin.toFixed(2);
  document.getElementById('br-staked').textContent = staked.toFixed(2);
  document.getElementById('br-exp').textContent = exp.toFixed(1);
  document.getElementById('br-count').textContent = openCount + ' offene Wette' + (openCount !== 1 ? 'n' : '');

  const bar = document.getElementById('br-bar');
  bar.style.width = Math.min(exp, 100) + '%';
  bar.className = 'exposure-fill ' + (exp < 30 ? 'exposure-low' : exp < 60 ? 'exposure-mid' : 'exposure-high');
}

// ── Render Home — Bet365-style with inline odds ───────────────
function _updateClock() {
  const el = document.getElementById('today-clock');
  if (el) el.textContent = new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Berlin'}) + ' Uhr';
}
setInterval(_updateClock, 30000);

function renderHome() {
  const c = document.getElementById('home-container');


  const games = _schedule.length ? _schedule : _signals.map(s => ({
    sport: s.sport, home: s.match.split(' vs ')[0].trim(),
    away: s.match.split(' vs ')[1].trim(), kickoff: s.kickoff||'', tour: s.tour||'',
  })).filter((g,i,a) => a.findIndex(x=>x.home===g.home&&x.away===g.away)===i);

  if (!games.length) {
    c.innerHTML = `<div class="empty"><div class="icon">🔍</div><div>Keine Spiele gefunden.<br><small>Nächster Scan: täglich 08:00 UTC</small></div></div>`;
    return;
  }

  // Seed oddsMap from all_odds (raw book odds for all games)
  const sigCount = {}, oddsMap = {};
  for (const [rawKey, raw] of Object.entries(_allOdds)) {
    const [rh, ra] = rawKey.split(' vs ').map(x => x.trim());
    const nk = matchKey(rh, ra);
    oddsMap[nk] = {
      home: raw.home > 1 ? { odds: raw.home, ev: null } : null,
      draw: raw.draw > 1 ? { odds: raw.draw, ev: null } : null,
      away: raw.away > 1 ? { odds: raw.away, ev: null } : null,
    };
  }
  // Override with signal odds (value bets) — marked with ev so they show green
  for (const s of _signals) {
    const [sh, sa] = s.match.split(' vs ').map(x => x.trim());
    const nk = matchKey(sh, sa);
    sigCount[nk] = (sigCount[nk]||0) + 1;
    if (!oddsMap[nk]) oddsMap[nk] = {};
    let k = null;
    if (['home','ah-0.5_home','first_set_a'].includes(s.market)) k = 'home';
    else if (s.market === 'draw') k = 'draw';
    else if (['away','ah+0.5_away','first_set_b'].includes(s.market)) k = 'away';
    if (k) oddsMap[nk][k] = { odds: s.odds, ev: s.ev_pct };
  }

  // Sort + filter next 30 days; remove live games (started, no result yet)
  const now = Date.now();
  const cutoff = now + 30*24*36e5;
  const sorted = games
    .filter(g => {
      if (g.kickoff && new Date(g.kickoff) > cutoff) return false;
      if (g.kickoff) {
        const ko = new Date(g.kickoff).getTime();
        const nk = matchKey(g.home, g.away);
        const hasResult = _wmResults[nk] && _wmResults[nk].home_score != null;
        if (ko < now && !hasResult) return false; // live / no result → hide
      }
      return true;
    })
    .sort((a,b) => {
      if (!a.kickoff && !b.kickoff) return 0;
      if (!a.kickoff) return 1; if (!b.kickoff) return -1;
      return new Date(a.kickoff) - new Date(b.kickoff);
    });

  // Group by date
  const days = {};
  for (const g of sorted) {
    const dk = g.kickoff ? g.kickoff.slice(0,10) : '__';
    if (!days[dk]) days[dk] = [];
    days[dk].push(g);
  }

  const oddsBtn = (nk, mkt) => {
    const od = (oddsMap[nk]||{})[mkt];
    if (!od) return `<div class="b365-btn no-odds">—</div>`;
    const cls = od.ev !== null ? 'val' : '';
    return `<div class="b365-btn ${cls}">${od.odds.toFixed(2)}</div>`;
  };

  // ── Heute-Sektion (nächste 24h) ──────────────────────────────
  const in24h = now + 24 * 36e5;
  const todayGames = sorted.filter(g => {
    if (!g.kickoff) return false;
    const t = new Date(g.kickoff).getTime();
    return t >= now - 36e5 && t <= in24h; // -1h für laufende Spiele
  });

  let todayHtml = '';
  if (todayGames.length > 0) {
    todayHtml += `<div class="today-header">
      <span class="today-dot"></span>
      <span>Heute · ${todayGames.length} Spiele</span>
      <span class="today-sub" id="today-clock"></span>
    </div>`;

    for (const g of todayGames) {
      const mk = `${g.home} vs ${g.away}`;
      const nk = matchKey(g.home, g.away);
      const n = sigCount[nk] || 0;
      const kickoffTs = new Date(g.kickoff).getTime();
      const minsLeft = Math.round((kickoffTs - now) / 60000);
      const isLive = minsLeft < 0 && minsLeft > -110;
      const timeStr = g.kickoff ? fmtTime(g.kickoff) : '—';

      // Countdown string
      let countdown = '';
      if (isLive) {
        countdown = `<span class="today-live-badge">LIVE</span>`;
      } else if (minsLeft < 60) {
        countdown = `<span class="today-countdown warn">in ${minsLeft} min</span>`;
      } else {
        const h = Math.floor(minsLeft / 60), m = minsLeft % 60;
        countdown = `<span class="today-countdown">in ${h}h ${m}min</span>`;
      }

      // Last-Call badge: Value-Signal vorhanden + Anpfiff < 4h
      const hasLastCall = n > 0 && minsLeft > 0 && minsLeft < 240;
      const lastCallBadge = hasLastCall ? `<span class="last-call-badge">⚡ Last Call</span>` : '';

      // Odds buttons
      const isFootball = g.sport === 'football';
      const odds = isFootball
        ? oddsBtn(nk,'home') + oddsBtn(nk,'draw') + oddsBtn(nk,'away')
        : oddsBtn(nk,'home') + oddsBtn(nk,'away');

      todayHtml += `<div class="b365-row today-row" onclick='openMatch(${JSON.stringify(mk)})'>
        <div class="b365-left">
          <div class="b365-time">
            ${timeStr}
            ${countdown}
            ${lastCallBadge}
            ${n > 0 && !hasLastCall ? `<span class="b365-val-tag">${n} Value</span>` : ''}
          </div>
          <div class="b365-teams">
            <span class="b365-team">${esc(g.home)} ${teamFlag(g.home)}</span>
            <span class="b365-team">${esc(g.away)} ${teamFlag(g.away)}</span>
          </div>
        </div>
        <div class="b365-odds">${odds}</div>
      </div>`;
    }

    todayHtml += `<div style="height:8px"></div>`;
  }

  // Update countdowns every 60s
  clearInterval(window._todayTimer);
  if (todayGames.length > 0) {
    window._todayTimer = setInterval(() => {
      if (document.getElementById('view-home')?.classList.contains('active')) {
        renderHome();
        clearInterval(window._todayTimer);
      }
    }, 60000);
  }

  // ── Smart Suggest ──────────────────────────────────────────
  let suggestHtml = '';
  const free = (_bankrollState && _bankrollState.free != null) ? _bankrollState.free : 0;
  const openCount = (_openBets || []).length;

  if (free > 5) {
    const slots = Math.max(0, 5 - openCount);
    const nowSug = Date.now();
    const now48h = nowSug + 48 * 36e5;
    const openMkSug = new Set((_openBets || []).map(b => {
      const [bh, ba] = (b.match || '').split(' vs ').map(x => x.trim());
      return matchKey(bh, ba);
    }));
    const seenMatches = new Set();
    const picks = [];
    let remaining = free;
    const candidates = (_signals || [])
      .filter(s => s.sport === 'football' && s.ev_pct >= 3)
      .filter(s => {
        if (!s.kickoff) return false;
        const ko = new Date(s.kickoff).getTime();
        return ko > nowSug && ko <= now48h;
      })
      .filter(s => {
        const [sh, sa] = (s.match || '').split(' vs ').map(x => x.trim());
        return !openMkSug.has(matchKey(sh, sa));
      })
      .sort((a, b) => b.ev_pct - a.ev_pct);

    for (const s of candidates) {
      if (picks.length >= Math.min(3, Math.max(1, slots))) break;
      const [sh, sa] = (s.match || '').split(' vs ').map(x => x.trim());
      const mk = matchKey(sh, sa);
      if (seenMatches.has(mk)) continue;
      const stake = Math.min(s.stake_eur || 10, remaining);
      if (stake < 3) continue;
      seenMatches.add(mk);
      picks.push({ ...s, display_stake: Math.round(stake) });
      remaining -= stake;
    }

    picks.sort((a, b) => (a.kickoff || '') < (b.kickoff || '') ? -1 : 1);
    if (picks.length > 0) {
      const usedStake = picks.reduce((s, p) => s + p.display_stake, 0);
      const picksHtml = picks.map(p => {
        const [ph, pa] = (p.match || '').split(' vs ').map(x => x.trim());
        const mktLabel = marketLabel(p.market, p.match);
        const evColor = p.ev_pct >= 10 ? 'var(--green)' : 'var(--yellow)';
        const timeStr = p.kickoff ? fmtKickoff(p.kickoff) : '';
        return `<div class="suggest-pick" onclick='openMatch(${JSON.stringify(p.match)})'>
          <div class="suggest-teams-row">${teamFlag(ph)} <strong>${esc(ph)}</strong><span class="vs">vs</span>${teamFlag(pa)} <strong>${esc(pa)}</strong><span style="font-size:11px;color:var(--muted);font-weight:500;margin-left:6px">${esc(timeStr)}</span></div>
          <div class="suggest-bottom-row">
            <span class="suggest-mkt-pill">${esc(mktLabel)}</span>
            <span class="suggest-odds">${p.odds.toFixed(2)}</span>
            <span class="suggest-ev" style="color:${evColor}">+${p.ev_pct.toFixed(1)}%</span>
            <span class="suggest-eur">€${p.display_stake}</span>
          </div>
        </div>`;
      }).join('');
      suggestHtml = `<div class="suggest-card">
        <div class="suggest-header">
          <div>
            <div class="suggest-title">⚡ Empfehlung</div>
            <div class="suggest-subtitle">${slots} freier Slot${slots !== 1 ? 's' : ''} · €${free.toFixed(0)} verfügbar</div>
          </div>
          <div>
            <div class="suggest-stake-big">€${usedStake}</div>
            <div class="suggest-stake-label">Einsatz</div>
          </div>
        </div>
        ${picksHtml}
      </div>`;
    }
  }

  let h = suggestHtml + todayHtml;
  for (const [dk, group] of Object.entries(days)) {
    // Day header
    if (dk === '__') {
      h += `<div class="b365-day-header">Datum ausstehend</div>`;
    } else {
      const dt = new Date(dk + 'T12:00:00');
      const diff = Math.round((dt - new Date().setHours(0,0,0,0)) / 864e5);
      const label = diff === 0 ? 'Heute' : diff === 1 ? 'Morgen'
        : dt.toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'2-digit'});
      h += `<div class="b365-day-header">${label}</div>`;
    }

    // Group by competition within each day
    const comps = {};
    for (const g of group) {
      const ck = g.sport === 'football' ? 'FIFA WM 2026' : (g.tour||'Tennis').toUpperCase();
      if (!comps[ck]) comps[ck] = { sport: g.sport, games: [] };
      comps[ck].games.push(g);
    }

    for (const [compKey, { sport, games: cg }] of Object.entries(comps)) {
      const mktHdr = sport === 'football'
        ? `<span>1</span><span>X</span><span>2</span>`
        : `<span>1</span><span>2</span>`;
      h += `<div class="comp-header">
        <span class="comp-icon">${sport === 'football' ? '🏆' : '🎾'}</span>
        <span class="comp-name">${compKey}</span>
        <span class="comp-meta">${cg.length} Spiele</span>
      </div>
      <div class="mkt-header">${mktHdr}</div>`;

      for (const g of cg) {
        const mk = `${g.home} vs ${g.away}`;
        const nk = matchKey(g.home, g.away);
        const n = sigCount[nk] || 0;
        const timeStr = g.kickoff ? fmtTime(g.kickoff) : '—';
        const isFootball = sport === 'football';
        const result = _wmResults[nk];
        const isCompleted = result && result.home_score != null && result.away_score != null;

        let rightCol;
        if (isCompleted) {
          const resultClass = result.home_score > result.away_score ? 'result-home'
            : result.away_score > result.home_score ? 'result-away' : 'result-draw';
          rightCol = `<div class="score-box ${resultClass}">${result.home_score}–${result.away_score}</div>`;
        } else {
          rightCol = isFootball
            ? oddsBtn(nk,'home') + oddsBtn(nk,'draw') + oddsBtn(nk,'away')
            : oddsBtn(nk,'home') + oddsBtn(nk,'away');
        }

        h += `<div class="b365-row" onclick='openMatch(${JSON.stringify(mk)})'>
          <div class="b365-left">
            <div class="b365-time">${timeStr}${isCompleted?` <span style="font-size:10px;color:var(--muted);font-weight:700">FT</span>`:''} ${n>0&&!isCompleted?` <span class="b365-val-tag">${n} Value</span>`:''}</div>
            <div class="b365-teams">
              <span class="b365-team">${esc(g.home)} ${teamFlag(g.home)}</span>
              <span class="b365-team">${esc(g.away)} ${teamFlag(g.away)}</span>
            </div>
          </div>
          <div class="b365-odds">${rightCol}</div>
        </div>`;
      }
    }
  }
  c.innerHTML = h;
}

// ── Render sport tab (signals grouped by match) ──────────────
function renderSport(sport) {
  const c = document.getElementById(sport + '-container');
  const sigs = _signals.filter(s => s.sport === sport);
  if (!sigs.length) {
    c.innerHTML = `<div class="empty"><div class="icon">🔍</div><div>Keine Value Bets.<br><small>Nächster Scan: täglich 08:00 UTC</small></div></div>`;
    return;
  }
  const groupMap = {};
  for (const s of sigs) {
    if (!groupMap[s.match]) groupMap[s.match] = [];
    groupMap[s.match].push(s);
  }
  const sortedGroups = Object.entries(groupMap).sort(([, a], [, b]) => {
    const ka = a[0].kickoff || '9999', kb = b[0].kickoff || '9999';
    return ka < kb ? -1 : ka > kb ? 1 : 0;
  });
  let h = '<div class="sport-view-inner">';
  for (const [match, mSigs] of sortedGroups) {
    const s0 = mSigs[0];
    const [mh, ma] = match.split(' vs ').map(x => x.trim());
    const timeStr = s0.kickoff ? fmtKickoff(s0.kickoff) : '';
    const tourStr = sport === 'tennis' ? (s0.tour||'Tennis').toUpperCase() : 'WM 2026';
    h += `<div style="padding:14px 16px 6px;border-bottom:1px solid rgba(48,54,61,.4)">
      <div style="font-size:16px;font-weight:900;letter-spacing:-.3px;margin-bottom:3px">${teamFlag(mh)} ${esc(mh)} <span style="color:var(--muted);font-weight:500">vs</span> ${teamFlag(ma)} ${esc(ma)}</div>
      <div style="font-size:11px;color:var(--muted);font-weight:600">${esc(tourStr)}${timeStr ? ' · ' + timeStr : ''}</div>
    </div>`;
    const ouS = mSigs.filter(s => /^o\/u/.test(s.market));
    const otherS = mSigs.filter(s => !/^o\/u/.test(s.market));
    h += `<div class="match-group-cards">${otherS.map(s => sigCard(s, false)).join('')}${buildOuAccordion(ouS, otherS.length === 0)}</div>`;
  }
  h += '</div>';
  c.innerHTML = h;
}

// ── WM Stats (Sparkline + Trefferquoten) ─────────────────────
let _wmStats = {};

function renderJournalStats(wmStats) {
  const wrap = document.getElementById('wm-stats-container');
  if (!wrap) return;

  const series = (wmStats.series || []);
  const stats = wmStats.stats || {};

  // Sparkline SVG
  let sparkHtml = '';
  if (series.length >= 2) {
    const balances = series.map(p => p.balance);
    const minB = Math.min(...balances), maxB = Math.max(...balances);
    const range = maxB - minB || 1;
    const W = 280, H = 60, pad = 4;
    const pts = series.map((p, i) => {
      const x = pad + (i / (series.length - 1)) * (W - 2*pad);
      const y = H - pad - ((p.balance - minB) / range) * (H - 2*pad);
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    }).join(' ');
    const last = balances[balances.length - 1];
    const delta = last - 100;
    const deltaStr = (delta >= 0 ? '+' : '') + delta.toFixed(2) + '€';
    const lineColor = delta >= 0 ? 'var(--green)' : 'var(--red)';
    const lastPt = pts.split(' ').pop().split(',');
    sparkHtml = `<div class="wm-sparkline">
      <div class="sparkline-header">
        <span class="sparkline-title">Bankroll-Verlauf WM 2026</span>
        <span class="sparkline-delta" style="color:${lineColor}">${deltaStr}</span>
      </div>
      <svg class="sparkline-svg" viewBox="0 0 ${W} ${H}" height="60">
        <polyline points="${pts}" fill="none" stroke="${lineColor}" stroke-width="2" stroke-linejoin="round"/>
        <circle cx="${parseFloat(lastPt[0])}" cy="${parseFloat(lastPt[1])}" r="3" fill="${lineColor}"/>
      </svg>
      <div style="font-size:10px;color:var(--muted);text-align:center;margin-top:4px">Start €100 · Aktuell €${last.toFixed(2)}</div>
    </div>`;
  }

  // Stats-Tabelle
  const rows = [
    ['1X2', stats['1x2']],
    ['Über/Unter', stats['ou25']],
    ['BTTS', stats['btts']],
  ].filter(([_, d]) => d && d.n > 0).map(([label, d]) =>
    `<tr><td>${label}</td><td>${d.n}</td><td>${d.won}/${d.n}</td><td>${d.hit_rate != null ? d.hit_rate : '—'}%</td><td style="color:${d.pnl >= 0 ? 'var(--green)' : 'var(--red)'}">${d.pnl >= 0 ? '+' : ''}${d.pnl != null ? d.pnl.toFixed(2) : '0.00'}€</td></tr>`
  ).join('');

  const tableHtml = rows ? `<div class="stats-table-wrap" style="margin:0 16px 10px">
    <table class="stats-table">
      <thead><tr><th>Markt</th><th style="text-align:right">Wetten</th><th style="text-align:right">Treffer</th><th style="text-align:right">Hit-%</th><th style="text-align:right">P&amp;L</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>` : '';

  wrap.innerHTML = (sparkHtml || tableHtml)
    ? `<div style="padding:12px 16px 4px">${sparkHtml}</div>${tableHtml}`
    : '';
}

// ── Render Journal ───────────────────────────────────────────
function renderJournal(history) {
  const c = document.getElementById('journal-container');
  if (!history || !history.length) {
    c.innerHTML = `<div class="empty"><div class="icon">📭</div><div>Noch keine abgeschlossenen Wetten.</div></div>`;
    return;
  }
  const rows = history.map(d => {
    const pc = d.pnl > 0 ? 'pos' : d.pnl < 0 ? 'neg' : 'neu';
    const rc = d.roi_pct > 0 ? 'pos' : d.roi_pct < 0 ? 'neg' : 'neu';
    const ds = d.date.slice(8,10)+'.'+d.date.slice(5,7)+'.'+d.date.slice(2,4);
    return `<tr><td>${ds}</td><td style="text-align:center">${d.n_bets}</td>
      <td class="${pc}" style="font-weight:700">${d.pnl>=0?'+':''}${d.pnl.toFixed(2)}€</td>
      <td class="${rc}">${d.roi_pct>=0?'+':''}${d.roi_pct.toFixed(1)}%</td></tr>`;
  }).join('');
  const tot = history.reduce((s,d)=>s+d.pnl,0);
  const tc = tot >= 0 ? 'pos' : 'neg';
  c.innerHTML = `<div class="journal-wrap">
    <table class="journal-table">
      <thead><tr><th>Datum</th><th>Wetten</th><th>P&amp;L</th><th>ROI</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="journal-total">
      <span>Gesamt (${history.length} Tage)</span>
      <span class="${tc}" style="font-weight:800">${tot>=0?'+':''}${tot.toFixed(2)}€</span>
    </div>
  </div>`;
}

// ── Group Standings ──────────────────────────────────────────
const WM_GROUPS = {
  A:['Mexico','South Africa','South Korea','Czechia'],
  B:['Canada','Bosnia and Herzegovina','Qatar','Switzerland'],
  C:['Brazil','Morocco','Haiti','Scotland'],
  D:['United States','Paraguay','Australia','Turkey'],
  E:['Germany','Curaçao',"Cote d'Ivoire",'Ecuador'],
  F:['Netherlands','Japan','Sweden','Tunisia'],
  G:['Belgium','Egypt','Iran','New Zealand'],
  H:['Spain','Cape Verde','Saudi Arabia','Uruguay'],
  I:['France','Senegal','Iraq','Norway'],
  J:['Argentina','Algeria','Austria','Jordan'],
  K:['Portugal','DR Congo','Uzbekistan','Colombia'],
  L:['England','Croatia','Ghana','Panama'],
};

function renderStandings() {
  const c = document.getElementById('standings-container');
  if (!c) return;
  const results = _wmResults;
  if (!Object.keys(results).length) {
    c.innerHTML = `<div style="font-size:12px;color:var(--muted);padding:8px 0">Noch keine Ergebnisse — WM startet 11. Juni 2026.</div>`;
    return;
  }

  // Build standings per team from results
  const stats = {};
  for (const teams of Object.values(WM_GROUPS)) {
    for (const t of teams) stats[t] = {p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0,form:[]};
  }
  for (const r of Object.values(results)) {
    const h = r.home, a = r.away;
    if (r.home_score == null || r.away_score == null) continue;
    const hs = r.home_score, as_ = r.away_score;
    if (!stats[h] || !stats[a]) continue;
    stats[h].p++; stats[h].gf += hs; stats[h].ga += as_;
    stats[a].p++; stats[a].gf += as_; stats[a].ga += hs;
    if (hs > as_) {
      stats[h].w++; stats[h].pts += 3; stats[h].form.push('W');
      stats[a].l++; stats[a].form.push('L');
    } else if (hs === as_) {
      stats[h].d++; stats[h].pts++; stats[h].form.push('D');
      stats[a].d++; stats[a].pts++; stats[a].form.push('D');
    } else {
      stats[a].w++; stats[a].pts += 3; stats[a].form.push('W');
      stats[h].l++; stats[h].form.push('L');
    }
  }

  let html = '';
  for (const [grp, teams] of Object.entries(WM_GROUPS)) {
    const sorted = [...teams].sort((a,b) => {
      const sa = stats[a], sb = stats[b];
      if (sb.pts !== sa.pts) return sb.pts - sa.pts;
      const gdA = sa.gf - sa.ga, gdB = sb.gf - sb.ga;
      if (gdB !== gdA) return gdB - gdA;
      return sb.gf - sa.gf;
    });
    const rows = sorted.map((t, i) => {
      const s = stats[t];
      const rowCls = i < 2 ? 'qualify-q' : i === 2 ? 'qualify-po' : '';
      const formHtml = s.form.slice(-3).map(f=>`<span class="form-${f}">${f}</span>`).join('');
      const gd = s.gf - s.ga;
      return `<tr class="${rowCls}">
        <td><span style="color:var(--muted);font-size:10px;font-weight:700;margin-right:6px">${i+1}</span>${esc(t)}</td>
        <td>${s.p}</td><td>${s.w}</td><td>${s.d}</td><td>${s.l}</td>
        <td>${s.gf}:${s.ga}</td>
        <td style="color:${gd>0?'var(--green)':gd<0?'var(--red)':'var(--muted)'}">${gd>0?'+':''}${gd}</td>
        <td class="standings-pts">${s.pts}</td>
        <td class="standings-form">${formHtml}</td>
      </tr>`;
    }).join('');
    html += `<div class="standings-group">
      <div class="standings-group-header">Gruppe ${grp}</div>
      <table class="standings-table">
        <thead><tr><th>Team</th><th>Sp</th><th>S</th><th>U</th><th>N</th><th>Tore</th><th>TD</th><th>Pkt</th><th>Form</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }
  c.innerHTML = html;
}

// ── Squad section for match detail ───────────────────────────
function squadSection(home, away) {
  if (!Object.keys(_squads).length) return '';
  const posLabels = {GK:'TW',DEF:'ABW',MID:'MIT',FWD:'STU'};

  function teamBlock(teamName) {
    // Fuzzy match team name
    const key = Object.keys(_squads).find(k =>
      k.toLowerCase() === teamName.toLowerCase() ||
      k.toLowerCase().includes(teamName.toLowerCase()) ||
      teamName.toLowerCase().includes(k.toLowerCase())
    );
    if (!key) return '';
    const d = _squads[key];
    const players = (d.players || []).slice().sort((a,b) => {
      const po = {GK:0,DEF:1,MID:2,FWD:3};
      return (po[a.pos]??9) - (po[b.pos]??9);
    });
    const injured = players.filter(p => p.status !== 'fit');
    const susp = d.suspended || [];
    let rows = '';
    let lastPos = '';
    for (const p of players) {
      if (p.status !== 'fit' || susp.includes(p.name)) {
        if (p.pos !== lastPos) {
          rows += `<div style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;padding:6px 12px 3px;border-bottom:1px solid rgba(48,54,61,.3)">${esc(posLabels[p.pos]||p.pos)}</div>`;
          lastPos = p.pos;
        }
        const sc = p.status === 'injured' ? 'status-injured' : p.status === 'suspended' ? 'status-suspended' : 'status-doubtful';
        const sl = p.status === 'injured' ? '🤕' : p.status === 'suspended' ? '🟡' : '❓';
        rows += `<div class="squad-player-row" style="padding:7px 12px">
          <span class="squad-player-pos">${esc(p.pos||'')}</span>
          <span class="squad-player-name">${esc(p.name)}</span>
          <span class="squad-player-status ${sc}">${sl} ${p.status}</span>
        </div>`;
      }
    }
    for (const s of susp) {
      rows += `<div class="squad-player-row" style="padding:7px 12px">
        <span class="squad-player-pos">—</span>
        <span class="squad-player-name">${esc(s)}</span>
        <span class="squad-player-status status-suspended">🟡 suspended</span>
      </div>`;
    }
    const statusLine = injured.length > 0 || susp.length > 0
      ? `<span style="color:var(--red);font-size:11px">${injured.length + susp.length} Ausfall${injured.length + susp.length !== 1 ? 'e' : ''}</span>`
      : `<span style="color:var(--green);font-size:11px">Kein Ausfall ${d.ampel||'🟢'}</span>`;
    return `<div style="flex:1;min-width:0">
      <div style="font-size:12px;font-weight:800;padding:0 0 5px">${esc(key)} ${statusLine}</div>
      ${rows || `<div style="font-size:11px;color:var(--muted);padding:6px 0">Alle fit 🟢</div>`}
    </div>`;
  }

  const homeBlock = teamBlock(home);
  const awayBlock = teamBlock(away);
  if (!homeBlock && !awayBlock) return '';

  return `<div style="margin-top:4px">
    <div class="section-title" style="padding-top:4px">👥 Kader & Ausfälle</div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;display:flex;gap:12px;align-items:flex-start">
      ${homeBlock}
      <div style="width:1px;background:var(--border);align-self:stretch"></div>
      ${awayBlock}
    </div>
  </div>`;
}

// ── Squads ───────────────────────────────────────────────────
let _squadFilter = '';

function renderSquads() {
  const con = document.getElementById('squads-container');
  const teams = Object.keys(_squads).filter(t =>
    !_squadFilter || t.toLowerCase().includes(_squadFilter.toLowerCase())
  ).sort();

  if (!teams.length && !Object.keys(_squads).length) {
    con.innerHTML = `<div style="padding:12px 16px;font-size:12px;color:var(--muted)">
      <input class="squad-search-inline" placeholder="🔍 Team suchen..." oninput="filterSquads(this.value)" style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;padding:9px 14px;outline:none;margin-bottom:12px;display:block">
      Laden…</div>`;
    return;
  }

  const posOrder = {GK:0,DEF:1,MID:2,FWD:3};
  let html = `<div class="squad-search">
    <input placeholder="🔍 Team suchen..." oninput="filterSquads(this.value)" value="${esc(_squadFilter)}">
  </div>`;

  if (!teams.length) {
    html += `<div style="padding:24px;text-align:center;color:var(--muted)">Kein Team gefunden.</div>`;
  }

  for (const team of teams) {
    const d = _squads[team];
    const injured = (d.players||[]).filter(p => p.status !== 'fit').length;
    const susp = (d.suspended||[]).length;
    const badge = injured > 0 ? `<span style="color:var(--red)">${injured} verletzt</span>` :
                  susp > 0   ? `<span style="color:var(--yellow)">${susp} gesperrt</span>` : '';
    html += `<div class="squad-team-row" onclick="openSquad('${esc(team)}')">
      <span class="squad-ampel">${d.ampel||'🟢'}</span>
      <span class="squad-team-name">${esc(team)}</span>
      <div class="squad-meta">${badge ? badge+'<br>' : ''}<span class="squad-source">${esc(d.source||'')}</span></div>
      <span style="color:var(--muted);font-size:16px">›</span>
    </div>`;
  }

  con.innerHTML = html;
}

function filterSquads(val) {
  _squadFilter = val;
  renderSquads();
}

function openSquad(team) {
  const d = _squads[team];
  if (!d) return;
  _prevView = 'squads';
  const players = (d.players||[]).slice().sort((a,b) => {
    const po = {GK:0,DEF:1,MID:2,FWD:3};
    return (po[a.pos]??9) - (po[b.pos]??9);
  });

  const posLabels = {GK:'Torhüter',DEF:'Abwehr',MID:'Mittelfeld',FWD:'Sturm'};
  let rows = '', lastPos = '';
  for (const p of players) {
    if (p.pos !== lastPos) {
      rows += `<div class="squad-pos-group">${esc(posLabels[p.pos]||p.pos)}</div>`;
      lastPos = p.pos;
    }
    const sc = p.status === 'injured' ? 'status-injured' :
               p.status === 'suspended' ? 'status-suspended' :
               p.status === 'doubtful' ? 'status-doubtful' : 'status-fit';
    const sl = p.status === 'fit' ? '' : p.status === 'injured' ? '🤕' : p.status === 'suspended' ? '🟡' : '❓';
    rows += `<div class="squad-player-row">
      <span class="squad-player-pos">${esc(p.pos||'')}</span>
      <span class="squad-player-name">${esc(p.name)}</span>
      ${sl ? `<span class="squad-player-status ${sc}">${sl}</span>` : ''}
    </div>`;
  }

  // Add suspended players not in squad list
  const susp = d.suspended||[];
  if (susp.length) {
    rows += `<div class="squad-pos-group">Gesperrt (manuell)</div>`;
    for (const s of susp) {
      rows += `<div class="squad-player-row"><span class="squad-player-pos">—</span><span class="squad-player-name">${esc(s)}</span><span class="squad-player-status status-suspended">🟡</span></div>`;
    }
  }

  const header = `<div class="squad-detail-header">
    <div class="squad-detail-name">${esc(team)}</div>
    <div class="squad-detail-meta">${d.player_count||players.length} Spieler · Quelle: ${esc(d.source||'—')} · ${d.ampel||'🟢'} Verfügbarkeit</div>
  </div>`;

  document.getElementById('detail-header').innerHTML = header;
  document.getElementById('detail-cards').innerHTML = rows || '<div style="padding:20px;color:var(--muted);text-align:center">Keine Spieler-Daten.</div>';
  showView('detail');
}

// ── Load ─────────────────────────────────────────────────────
async function _load() {
  const r = await fetch(DATA_URL + '?t=' + Date.now(), { cache: 'no-store' });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const d = await r.json();

  const dt = new Date(d.updated), age = (Date.now()-dt)/36e5;
  document.getElementById('updated-time').textContent =
    dt.toLocaleString('de-DE',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
  document.getElementById('stale-banner').style.display = age > 26 ? 'block' : 'none';
  document.getElementById('dot').style.background = age > 26 ? 'var(--yellow)' : 'var(--green)';

  _signals = [...(d.football||[]), ...(d.tennis||[])];
  _schedule = d.schedule || [];
  _allOdds = d.all_odds || {};
  _modelTips = d.model_tips || {};
  _openBets = d.open_bets || [];
  _bankrollState = d.bankroll_state || {};
  _oddsHistory = d.odds_history || {};
  // Index wm_results by matchKey for fast lookup in Home tab
  _wmResults = {};
  for (const r of (d.wm_results || [])) {
    const mk = matchKey(r.home, r.away);
    _wmResults[mk] = r;
  }
  renderBankrollStrip();

  const setB = (id, n) => { const el=document.getElementById(id); el.textContent=n; el.classList.toggle('show',n>0); };
  setB('badge-all',      _signals.length);
  setB('badge-football', _signals.filter(s=>s.sport==='football').length);
  setB('badge-tennis',   _signals.filter(s=>s.sport==='tennis').length);
  const setBBets = document.getElementById('badge-bets');
  if (setBBets) { setBBets.textContent = _openBets.length; setBBets.classList.toggle('show', _openBets.length > 0); }

  _wmStats = d.wm_stats || {};
  renderHome();
  renderSport('football');
  renderSport('tennis');
  renderJournalStats(_wmStats);
  renderJournal(d.history || []);
  renderStandings();
  renderBets();
  _updateClock();

  // Load squads in background (non-blocking)
  fetch(SQUADS_URL + '?t=' + Date.now(), { cache: 'no-store' })
    .then(r => r.ok ? r.json() : null)
    .then(sd => { if (sd) _squads = sd.teams || {}; })
    .catch(() => {});
}

async function load() {
  const btn = document.getElementById('refresh-btn');
  btn.textContent = '↺…';
  try { await _load(); } catch(e) {
    document.getElementById('home-container').innerHTML =
      `<div class="empty"><div class="icon">⚠️</div><div>Fehler: ${esc(e.message)}</div></div>`;
  } finally { btn.textContent = '↺'; }
}

setInterval(load, 30*60*1000);
load();
</script>
