<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SportsBrain">
  <meta name="theme-color" content="#0d1117">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>SportsBrain</title>
  <style>
    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --card:     #1c2128;
      --nav-bg:   #161b22;
      --border:   #30363d;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --green:    #00c853;
      --green-d:  #082010;
      --yellow:   #d29922;
      --yellow-d: #2d2208;
      --red:      #f85149;
      --nav-h:    calc(96px + env(safe-area-inset-bottom));
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif; font-size: 14px; -webkit-font-smoothing: antialiased; overscroll-behavior: none; }

    /* ── Header ── */
    header { background: #0d1117; border-bottom: 1px solid rgba(255,255,255,0.08); padding: 0 16px; height: 52px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
    .logo { font-size: 19px; font-weight: 900; letter-spacing: -0.6px; }
    .logo em { color: var(--green); font-style: normal; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .live-pill { display: flex; align-items: center; gap: 5px; background: rgba(0,200,83,0.1); border: 1px solid rgba(0,200,83,0.2); border-radius: 20px; padding: 3px 10px; }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    .updated-text { font-size: 11px; color: var(--green); font-weight: 600; }
    .icon-btn { background: none; border: none; color: var(--muted); font-size: 20px; padding: 4px 6px; cursor: pointer; line-height: 1; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.35} }

    /* ── Portfolio strip ── */
    .portfolio-strip { background: #0d1117; border-bottom: 1px solid rgba(255,255,255,0.07); padding: 8px 12px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .pstat { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 8px 6px; display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .pstat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .pstat-value { font-size: 15px; font-weight: 800; }
    .pos { color: var(--green); }
    .neg { color: var(--red); }
    .neu { color: var(--text); }

    /* ── Stale banner ── */
    .stale-banner { background: var(--yellow-d); border-bottom: 1px solid var(--yellow); color: var(--yellow); text-align: center; padding: 7px; font-size: 12px; font-weight: 600; display: none; }

    /* ── Views ── */
    main { padding-bottom: var(--nav-h); max-width: 600px; margin: 0 auto; }
    .view { display: none; }
    .view.active { display: block; }

    /* ── Game list ── */
    .day-header { font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; padding: 14px 16px 6px; }
    .game-row { display: flex; align-items: center; padding: 13px 16px; border-bottom: 1px solid rgba(48,54,61,.6); gap: 12px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .game-row:active { background: rgba(255,255,255,.04); }
    .sport-icon { font-size: 22px; flex-shrink: 0; width: 30px; text-align: center; }
    .game-info { flex: 1; min-width: 0; }
    .game-teams { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .game-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .game-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .sig-bubble { background: var(--green); color: #000; font-size: 11px; font-weight: 900; border-radius: 12px; padding: 2px 9px; min-width: 22px; text-align: center; }
    .chevron { color: #4a5568; font-size: 20px; line-height: 1; }

    /* ── Detail view ── */
    .back-bar { display: flex; align-items: center; gap: 6px; padding: 12px 16px 10px; cursor: pointer; color: var(--green); font-size: 15px; font-weight: 600; -webkit-tap-highlight-color: transparent; border-bottom: 1px solid var(--border); }
    .back-bar:active { opacity: .7; }
    .match-header { padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .match-sport { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
    .match-teams { font-size: 22px; font-weight: 900; letter-spacing: -.5px; margin-bottom: 3px; }
    .match-time { font-size: 12px; color: var(--muted); }
    .detail-cards { padding: 12px 16px; }

    /* ── Signal card ── */
    .sig-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; border-left: 3px solid transparent; }
    .sig-card.high { border-left-color: var(--green); }
    .sig-card.medium { border-left-color: var(--yellow); }
    .card-market { font-size: 12px; color: var(--muted); margin-bottom: 11px; padding: 4px 9px; background: rgba(255,255,255,0.05); border-radius: 6px; display: inline-block; border: 1px solid rgba(255,255,255,0.07); }
    .card-footer { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .odds-btn { background: rgba(0,200,83,0.1); border: 1.5px solid var(--green); border-radius: 8px; padding: 7px 18px; font-size: 20px; font-weight: 900; color: var(--green); flex-shrink: 0; }
    .sig-card.medium .odds-btn { background: rgba(210,153,34,.08); border-color: var(--yellow); color: var(--yellow); }
    .ev-chip { font-size: 13px; font-weight: 700; }
    .ev-h { color: var(--green); }
    .ev-m { color: var(--yellow); }
    .conf-badge { font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; }
    .conf-HIGH   { background: var(--green-d); color: var(--green); border: 1px solid rgba(0,200,83,.2); }
    .conf-MEDIUM { background: var(--yellow-d); color: var(--yellow); border: 1px solid rgba(210,153,34,.2); }
    .stake-val { font-size: 13px; color: var(--muted); margin-left: auto; font-weight: 600; }

    /* ── Sport tabs (Fußball/Tennis): signals grouped by match ── */
    .sport-view-inner { padding: 0 0 8px; }
    .match-group-header { font-size: 12px; font-weight: 700; color: var(--text); padding: 14px 16px 8px; border-bottom: 1px solid rgba(48,54,61,.4); display: flex; align-items: center; gap: 8px; }
    .match-group-header .sport-tag { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; }
    .match-group-cards { padding: 10px 16px 4px; }

    /* ── Section title ── */
    .section-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; padding: 14px 16px 8px; display: flex; align-items: center; gap: 8px; }
    .section-title::after { content:''; flex:1; height:1px; background:var(--border); }

    /* ── Empty / Skeleton ── */
    .empty { text-align: center; padding: 52px 16px; color: var(--muted); }
    .empty .icon { font-size: 34px; margin-bottom: 10px; }
    .skel { background: linear-gradient(90deg,var(--card) 25%,var(--surface) 50%,var(--card) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 12px; height: 80px; margin: 10px 16px; }
    @keyframes shimmer { 0%{background-position:200% 0}100%{background-position:-200% 0} }

    /* ── Journal ── */
    .journal-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin: 0 16px; }
    .journal-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .journal-table th { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
    .journal-table td { padding: 11px 12px; border-bottom: 1px solid rgba(48,54,61,.4); }
    .journal-table tr:last-child td { border-bottom: none; }
    .journal-total { background: rgba(255,255,255,0.03); border-top: 1px solid var(--border); padding: 11px 12px; font-size: 13px; color: var(--muted); display: flex; justify-content: space-between; }

    /* ── Bottom nav ── */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--nav-bg); border-top: 2px solid var(--green); display: flex; padding-bottom: max(env(safe-area-inset-bottom), 10px); z-index: 100; }
    .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 13px 4px 11px; gap: 5px; cursor: pointer; position: relative; -webkit-tap-highlight-color: transparent; min-height: 70px; }
    .nav-tab.active { background: rgba(0,200,83,0.07); }
    .ni { font-size: 26px; line-height: 1; transition: transform 0.15s; }
    .nav-tab.active .ni { transform: scale(1.1); }
    .nl { font-size: 11px; color: #5a6370; font-weight: 700; letter-spacing: .3px; text-transform: uppercase; }
    .nav-tab.active .nl { color: var(--green); }
    .nav-badge { position: absolute; top: 9px; right: calc(50% - 20px); background: var(--green); color: #000; font-size: 10px; font-weight: 900; border-radius: 10px; padding: 1px 6px; min-width: 18px; text-align: center; display: none; }
    .nav-badge.show { display: block; }
  </style>
</head>
<body>

<header>
  <div class="logo">Sports<em>Brain</em></div>
  <div class="header-right">
    <div class="live-pill">
      <span class="live-dot" id="dot"></span>
      <span class="updated-text" id="updated-time">—</span>
    </div>
    <button class="icon-btn" onclick="load()" id="refresh-btn">↺</button>
  </div>
</header>

<div class="stale-banner" id="stale-banner">⚠️ Daten älter als 26h — Scan läuft täglich 08:00 UTC</div>

<div class="portfolio-strip">
  <div class="pstat"><span class="pstat-label">Aktiv</span><span class="pstat-value neu" id="s-open">—</span></div>
  <div class="pstat"><span class="pstat-label">P&amp;L</span><span class="pstat-value" id="s-pnl">—</span></div>
  <div class="pstat"><span class="pstat-label">ROI</span><span class="pstat-value" id="s-roi">—</span></div>
  <div class="pstat"><span class="pstat-label">Wetten ges.</span><span class="pstat-value neu" id="s-total">—</span></div>
</div>

<main>
  <section id="view-home" class="view active">
    <div id="home-container">
      <div class="skel"></div><div class="skel"></div><div class="skel"></div>
    </div>
  </section>

  <section id="view-detail" class="view">
    <div class="back-bar" onclick="closeDetail()">‹ Zurück</div>
    <div id="detail-header"></div>
    <div class="detail-cards" id="detail-cards"></div>
  </section>

  <section id="view-football" class="view">
    <div id="football-container">
      <div class="skel"></div><div class="skel"></div>
    </div>
  </section>

  <section id="view-tennis" class="view">
    <div id="tennis-container">
      <div class="skel"></div><div class="skel"></div>
    </div>
  </section>

  <section id="view-journal" class="view">
    <div class="section-title">P&amp;L Verlauf</div>
    <div id="journal-container">
      <div class="empty"><div class="icon">📭</div><div>Noch keine abgeschlossenen Wetten.</div></div>
    </div>
  </section>
</main>

<nav class="bottom-nav">
  <div class="nav-tab active" data-view="home" onclick="navTo(this)">
    <span class="ni">🏠</span><span class="nl">Home</span>
    <span class="nav-badge" id="badge-all"></span>
  </div>
  <div class="nav-tab" data-view="football" onclick="navTo(this)">
    <span class="ni">⚽</span><span class="nl">Fußball</span>
    <span class="nav-badge" id="badge-football"></span>
  </div>
  <div class="nav-tab" data-view="tennis" onclick="navTo(this)">
    <span class="ni">🎾</span><span class="nl">Tennis</span>
    <span class="nav-badge" id="badge-tennis"></span>
  </div>
  <div class="nav-tab" data-view="journal" onclick="navTo(this)">
    <span class="ni">📅</span><span class="nl">Kalender</span>
  </div>
</nav>

<script>
const DATA_URL = 'data/signals.json';
let _signals = [];
let _schedule = [];
let _prevView = 'home';

// ── Navigation ───────────────────────────────────────────────
function navTo(tab) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  _prevView = tab.dataset.view;
  showView(tab.dataset.view);
}
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + id).classList.add('active');
}
function closeDetail() { showView(_prevView); }

// ── Open match detail ────────────────────────────────────────
function openMatch(matchKey) {
  const sigs = _signals.filter(s => s.match === matchKey);
  if (!sigs.length) return;
  const s0 = sigs[0];
  const sportLabel = s0.sport === 'football' ? '⚽ WM 2026' : `🎾 ${(s0.tour||'Tennis').toUpperCase()}`;
  const timeStr = s0.kickoff ? fmtKickoff(s0.kickoff) : '';
  document.getElementById('detail-header').innerHTML = `
    <div class="match-header">
      <div class="match-sport">${sportLabel}</div>
      <div class="match-teams">${esc(matchKey)}</div>
      ${timeStr ? `<div class="match-time">${timeStr}</div>` : ''}
    </div>`;
  document.getElementById('detail-cards').innerHTML = sigs.map(sigCard).join('');
  showView('detail');
}

// ── Helpers ──────────────────────────────────────────────────
const esc = s => s.replace(/</g,'&lt;').replace(/>/g,'&gt;');

function fmtKickoff(k) {
  try {
    return new Date(k).toLocaleString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit',timeZone:'Europe/Berlin'});
  } catch { return ''; }
}

function fmtTime(k) {
  try {
    return new Date(k).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Berlin'}) + ' Uhr';
  } catch { return ''; }
}

function marketLabel(mkt, match) {
  const p = match.split(' vs ');
  const a = p[0]?.trim()||'?', b = p[1]?.trim()||'?';
  return ({
    home:`Sieg ${a}`, draw:'Unentschieden', away:`Sieg ${b}`,
    'o/u2.5_over':'Über 2.5 Tore','o/u2.5_under':'Unter 2.5 Tore',
    'o/u1.5_over':'Über 1.5 Tore','o/u1.5_under':'Unter 1.5 Tore',
    'o/u3.5_over':'Über 3.5 Tore','o/u3.5_under':'Unter 3.5 Tore',
    'btts_yes':'Beide treffen','btts_no':'Nicht beide treffen',
    'ftts_home':`1. Tor: ${a}`,'ftts_away':`1. Tor: ${b}`,
    'first_set_a':`1. Satz: ${a}`,'first_set_b':`1. Satz: ${b}`,
    'ah-1.5_a':`${a} 3:0 / 3:1`,'ah+1.5_b':`${b} +1.5 Sätze`,
    'ah-0.5_home':`AH -0.5 ${a}`,'ah+0.5_away':`AH +0.5 ${b}`,
    'ah-1.0_home':`AH -1.0 ${a}`,'ah+1.0_away':`AH +1.0 ${b}`,
    'ah-1.5_home':`AH -1.5 ${a}`,'ah+1.5_away':`AH +1.5 ${b}`,
    'ah-2.0_home':`AH -2.0 ${a}`,'ah+2.0_away':`AH +2.0 ${b}`,
    'ah-2.5_home':`AH -2.5 ${a}`,'ah+2.5_away':`AH +2.5 ${b}`,
  })[mkt] || mkt;
}

// ── Signal card ──────────────────────────────────────────────
function sigCard(s) {
  const cls = s.confidence === 'HIGH' ? 'high' : 'medium';
  const evCls = s.ev_pct >= 10 ? 'ev-h' : 'ev-m';
  return `<div class="sig-card ${cls}">
    <div class="card-market">${marketLabel(s.market, s.match)}</div>
    <div class="card-footer">
      <span class="odds-btn">${s.odds.toFixed(2)}</span>
      <span class="ev-chip ${evCls}">EV +${s.ev_pct}%</span>
      <span class="conf-badge conf-${s.confidence}">${s.confidence}</span>
      <span class="stake-val">€${s.stake_eur.toFixed(0)}</span>
    </div>
  </div>`;
}

// ── Render Home (game list from schedule, sorted by kickoff) ─
function renderHome() {
  const c = document.getElementById('home-container');
  const games = _schedule.length ? _schedule : _signals.map(s => ({
    sport: s.sport, home: s.match.split(' vs ')[0].trim(),
    away: s.match.split(' vs ')[1].trim(), kickoff: s.kickoff||'', tour: s.tour||'',
  })).filter((g,i,a) => a.findIndex(x=>x.home===g.home&&x.away===g.away)===i);

  if (!games.length) {
    c.innerHTML = `<div class="empty"><div class="icon">🔍</div><div>Keine Spiele gefunden.<br><small>Nächster Scan: täglich 08:00 UTC</small></div></div>`;
    return;
  }

  // Build signal count lookup by "Home vs Away"
  const sigCount = {};
  for (const s of _signals) sigCount[s.match] = (sigCount[s.match]||0) + 1;

  // Filter next 30 days + sort by kickoff
  const cutoff = Date.now() + 30*24*36e5;
  const sorted = games
    .filter(g => !g.kickoff || new Date(g.kickoff) <= cutoff)
    .sort((a,b) => {
      if (!a.kickoff && !b.kickoff) return 0;
      if (!a.kickoff) return 1;
      if (!b.kickoff) return -1;
      return new Date(a.kickoff) - new Date(b.kickoff);
    });

  // Group by date
  const days = {};
  for (const g of sorted) {
    const dk = g.kickoff ? g.kickoff.slice(0,10) : '__';
    if (!days[dk]) days[dk] = [];
    days[dk].push(g);
  }

  let h = '';
  for (const [dk, group] of Object.entries(days)) {
    if (dk === '__') {
      h += `<div class="day-header">Datum ausstehend</div>`;
    } else {
      const dt = new Date(dk + 'T12:00:00');
      const diff = Math.round((dt - new Date().setHours(0,0,0,0)) / 864e5);
      const label = diff === 0 ? 'Heute' : diff === 1 ? 'Morgen'
        : dt.toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'2-digit'});
      h += `<div class="day-header">${label}</div>`;
    }
    for (const g of group) {
      const icon = g.sport === 'football' ? '⚽' : '🎾';
      const matchKey = `${g.home} vs ${g.away}`;
      const sub = g.kickoff ? fmtTime(g.kickoff)
                : g.sport === 'football' ? 'WM 2026'
                : g.tour ? g.tour.toUpperCase() : 'Tennis';
      const n = sigCount[matchKey] || 0;
      h += `<div class="game-row" onclick='openMatch(${JSON.stringify(matchKey)})'>
        <span class="sport-icon">${icon}</span>
        <div class="game-info">
          <div class="game-teams">${esc(matchKey)}</div>
          <div class="game-sub">${sub}</div>
        </div>
        <div class="game-right">
          ${n > 0 ? `<span class="sig-bubble">${n}</span>` : ''}
          <span class="chevron">›</span>
        </div>
      </div>`;
    }
  }
  c.innerHTML = h;
}

// ── Render sport tab (signals grouped by match) ──────────────
function renderSport(sport) {
  const c = document.getElementById(sport + '-container');
  const sigs = _signals.filter(s => s.sport === sport);
  if (!sigs.length) {
    c.innerHTML = `<div class="empty"><div class="icon">🔍</div><div>Keine Value Bets.<br><small>Nächster Scan: täglich 08:00 UTC</small></div></div>`;
    return;
  }
  const groupMap = {};
  for (const s of sigs) {
    if (!groupMap[s.match]) groupMap[s.match] = [];
    groupMap[s.match].push(s);
  }
  let h = '<div class="sport-view-inner">';
  for (const [match, mSigs] of Object.entries(groupMap)) {
    const s0 = mSigs[0];
    const sub = s0.kickoff ? fmtKickoff(s0.kickoff) : (sport === 'tennis' ? (s0.tour||'Tennis').toUpperCase() : 'WM 2026');
    h += `<div class="match-group-header">${esc(match)}<span class="match-group-header sport-tag">${sub}</span></div>`;
    h += `<div class="match-group-cards">${mSigs.map(sigCard).join('')}</div>`;
  }
  h += '</div>';
  c.innerHTML = h;
}

// ── Render Journal ───────────────────────────────────────────
function renderJournal(history) {
  const c = document.getElementById('journal-container');
  if (!history || !history.length) {
    c.innerHTML = `<div class="empty"><div class="icon">📭</div><div>Noch keine abgeschlossenen Wetten.</div></div>`;
    return;
  }
  const rows = history.map(d => {
    const pc = d.pnl > 0 ? 'pos' : d.pnl < 0 ? 'neg' : 'neu';
    const rc = d.roi_pct > 0 ? 'pos' : d.roi_pct < 0 ? 'neg' : 'neu';
    const ds = d.date.slice(8,10)+'.'+d.date.slice(5,7)+'.'+d.date.slice(2,4);
    return `<tr><td>${ds}</td><td style="text-align:center">${d.n_bets}</td>
      <td class="${pc}" style="font-weight:700">${d.pnl>=0?'+':''}${d.pnl.toFixed(2)}€</td>
      <td class="${rc}">${d.roi_pct>=0?'+':''}${d.roi_pct.toFixed(1)}%</td></tr>`;
  }).join('');
  const tot = history.reduce((s,d)=>s+d.pnl,0);
  const tc = tot >= 0 ? 'pos' : 'neg';
  c.innerHTML = `<div class="journal-wrap">
    <table class="journal-table">
      <thead><tr><th>Datum</th><th>Wetten</th><th>P&amp;L</th><th>ROI</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="journal-total">
      <span>Gesamt (${history.length} Tage)</span>
      <span class="${tc}" style="font-weight:800">${tot>=0?'+':''}${tot.toFixed(2)}€</span>
    </div>
  </div>`;
}

// ── Load ─────────────────────────────────────────────────────
async function _load() {
  const r = await fetch(DATA_URL + '?t=' + Date.now(), { cache: 'no-store' });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const d = await r.json();

  const dt = new Date(d.updated), age = (Date.now()-dt)/36e5;
  document.getElementById('updated-time').textContent =
    dt.toLocaleString('de-DE',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
  document.getElementById('stale-banner').style.display = age > 26 ? 'block' : 'none';
  document.getElementById('dot').style.background = age > 26 ? 'var(--yellow)' : 'var(--green)';

  const p = d.portfolio || {};
  document.getElementById('s-open').textContent = p.n_open ?? '0';
  const pnl = p.total_pnl ?? 0, roi = p.roi_pct ?? 0;
  const pe = document.getElementById('s-pnl');
  pe.textContent = (pnl>=0?'+':'') + pnl.toFixed(2) + '€';
  pe.className = 'pstat-value ' + (pnl>0?'pos':pnl<0?'neg':'neu');
  const re = document.getElementById('s-roi');
  re.textContent = (roi>=0?'+':'') + roi.toFixed(1) + '%';
  re.className = 'pstat-value ' + (roi>0?'pos':roi<0?'neg':'neu');
  document.getElementById('s-total').textContent = p.n_bets ?? '0';

  _signals = [...(d.football||[]), ...(d.tennis||[])];
  _schedule = d.schedule || [];

  const setB = (id, n) => { const el=document.getElementById(id); el.textContent=n; el.classList.toggle('show',n>0); };
  setB('badge-all',      _signals.length);
  setB('badge-football', _signals.filter(s=>s.sport==='football').length);
  setB('badge-tennis',   _signals.filter(s=>s.sport==='tennis').length);

  renderHome();
  renderSport('football');
  renderSport('tennis');
  renderJournal(d.history || []);
}

async function load() {
  const btn = document.getElementById('refresh-btn');
  btn.textContent = '↺…';
  try { await _load(); } catch(e) {
    document.getElementById('home-container').innerHTML =
      `<div class="empty"><div class="icon">⚠️</div><div>Fehler: ${esc(e.message)}</div></div>`;
  } finally { btn.textContent = '↺'; }
}

setInterval(load, 30*60*1000);
load();
</script>
</body>
</html>
